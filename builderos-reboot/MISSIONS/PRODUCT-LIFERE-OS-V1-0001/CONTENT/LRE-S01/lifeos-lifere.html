<!DOCTYPE html>
<!-- SYNOPSIS: LifeRE Alpha — daily command center (Point B surface) -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/overlay/lifeos-theme.js"></script>
  <script src="/overlay/lifeos-bootstrap.js"></script>
  <link rel="stylesheet" href="/overlay/lifeos-ds.css">
  <title>LifeRE — Daily Command Center</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --lifere-accent: #0ea5e9;
      --bg: #0a0a0f;
      --card: #111118;
      --border: #1e1e2e;
      --text: #e8e8f0;
      --muted: #888;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .root {
      max-width: 880px;
      margin: 0 auto;
      padding: 28px 18px 80px;
    }
    .page-header {
      margin-bottom: 28px;
      border-left: 4px solid var(--lifere-accent);
      padding-left: 14px;
    }
    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .page-header p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--lifere-accent);
      font-weight: 700;
      margin-bottom: 12px;
    }
    .priority-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .priority-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 10px 12px;
      background: rgba(14, 165, 233, 0.06);
      border-radius: 8px;
      border: 1px solid rgba(14, 165, 233, 0.15);
    }
    .priority-rank {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--lifere-accent);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .priority-task { font-size: 14px; font-weight: 600; }
    .priority-why { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .blocker-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .blocker-tag {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #1a1a2a;
      color: #bbb;
    }
    .debrief-row { font-size: 13px; margin-bottom: 8px; color: #ccc; }
    .debrief-label { color: var(--lifere-accent); font-weight: 600; margin-right: 6px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .btn {
      border: 1px solid var(--border);
      background: #17171f;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--lifere-accent);
      border-color: var(--lifere-accent);
      color: #fff;
    }
    .status-line { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .empty { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="root" data-lifere="daily-command-center" id="lifere-daily-command-center">
    <header class="page-header">
      <h1>LifeRE Daily Command Center</h1>
      <p id="lifere-dateline">Loading…</p>
    </header>

    <section class="section" data-lifere="top-3-priorities" id="lifere-top-3">
      <div class="section-title">Top 3 Priorities</div>
      <ul class="priority-list" id="lifere-priority-list">
        <li class="empty">Loading priorities…</li>
      </ul>
    </section>

    <section class="section">
      <div class="section-title">Blocker Scan</div>
      <div class="blocker-tags" id="lifere-blockers"></div>
    </section>

    <section class="section" data-lifere="nightly-debrief" id="lifere-nightly-debrief">
      <div class="section-title">Nightly Debrief Draft</div>
      <div id="lifere-debrief-body">
        <p class="empty">Run debrief to seed tomorrow's top 3.</p>
      </div>
      <div class="actions">
        <button type="button" class="btn btn-primary" id="lifere-run-debrief">Generate debrief draft</button>
        <button type="button" class="btn" id="lifere-refresh">Refresh command center</button>
      </div>
      <p class="status-line" id="lifere-status"></p>
    </section>
  </div>

  <script>
    (async function initLifeRE() {
      const dateline = document.getElementById('lifere-dateline');
      const list = document.getElementById('lifere-priority-list');
      const blockersEl = document.getElementById('lifere-blockers');
      const debriefBody = document.getElementById('lifere-debrief-body');
      const statusEl = document.getElementById('lifere-status');
      const now = new Date();
      dateline.textContent = now.toLocaleDateString(undefined, {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
      });

      async function apiFetch(path, options) {
        const ctx = window.LifeOSAuth?.();
        if (ctx?.fetchWithAuth) return ctx.fetchWithAuth(path, options);
        const headers = { 'Content-Type': 'application/json', ...(options?.headers || {}) };
        const key = ctx?.KEY || localStorage.getItem('commandKey');
        if (key) headers['x-command-key'] = key;
        return fetch(path, { ...options, headers });
      }

      function renderPriorities(focus) {
        const items = focus || [];
        if (!items.length) {
          list.innerHTML = '<li class="empty">No priorities yet.</li>';
          return;
        }
        list.innerHTML = items.map((p) => `
          <li class="priority-item">
            <span class="priority-rank">${p.rank || '?'}</span>
            <div>
              <div class="priority-task">${escapeHtml(p.task || '')}</div>
              <div class="priority-why">${escapeHtml(p.why_now || '')}</div>
            </div>
          </li>
        `).join('');
      }

      function renderBlockers(tags) {
        blockersEl.innerHTML = (tags || []).map((t) =>
          `<span class="blocker-tag">${escapeHtml(t)}</span>`).join('') || '<span class="empty">None flagged</span>';
      }

      function renderDebrief(debrief) {
        if (!debrief) {
          debriefBody.innerHTML = '<p class="empty">No debrief yet.</p>';
          return;
        }
        const wins = (debrief.wins || []).map((w) => `<div class="debrief-row"><span class="debrief-label">Win:</span>${escapeHtml(w)}</div>`).join('');
        const losses = (debrief.losses || []).map((l) => `<div class="debrief-row"><span class="debrief-label">Loss:</span>${escapeHtml(l)}</div>`).join('');
        const seeds = (debrief.next_day_top_3_seed || []).map((s) =>
          `<div class="debrief-row"><span class="debrief-label">Tomorrow:</span>${escapeHtml(s.title || '')}</div>`).join('');
        debriefBody.innerHTML = `
          ${wins || '<div class="debrief-row">No wins logged.</div>'}
          ${losses}
          <div class="debrief-row" style="margin-top:10px"><span class="debrief-label">Summary:</span>${escapeHtml(debrief.summary || '')}</div>
          ${seeds ? `<div style="margin-top:12px"><div class="section-title" style="margin-bottom:8px">Tomorrow seed</div>${seeds}</div>` : ''}
        `;
      }

      function escapeHtml(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      async function loadCommandCenter() {
        statusEl.textContent = 'Loading…';
        try {
          const res = await apiFetch('/api/v1/lifere/daily-command-center', {
            method: 'POST',
            body: JSON.stringify({ agent: 'founder', backlog: [] }),
          });
          const data = await res.json();
          if (!data.ok) throw new Error(data.error || 'API error');
          renderPriorities(data.result?.daily_focus);
          renderBlockers(data.result?.blocker_scan);
          statusEl.textContent = 'Command center loaded.';
        } catch (err) {
          statusEl.textContent = `Load failed: ${err.message}`;
        }
      }

      async function runDebrief() {
        statusEl.textContent = 'Generating debrief…';
        try {
          const res = await apiFetch('/api/v1/lifere/nightly-debrief', {
            method: 'POST',
            body: JSON.stringify({ wins: [], losses: [], notes: 'End of day debrief draft' }),
          });
          const data = await res.json();
          if (!data.ok) throw new Error(data.error || 'API error');
          renderDebrief(data.result);
          statusEl.textContent = 'Debrief draft ready.';
        } catch (err) {
          statusEl.textContent = `Debrief failed: ${err.message}`;
        }
      }

      document.getElementById('lifere-run-debrief').addEventListener('click', runDebrief);
      document.getElementById('lifere-refresh').addEventListener('click', loadCommandCenter);
      await loadCommandCenter();
    })();
  </script>
</body>
</html>
