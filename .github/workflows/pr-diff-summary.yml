name: PR Diff Summary

on:
  pull_request:
    branches: [main]

jobs:
  diff-summary:
    name: Git diff stat summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Print diff summary
        run: node scripts/git-diff-summary.mjs
