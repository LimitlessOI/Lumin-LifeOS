# SYNOPSIS: yml — .github/workflows/smoke-test.yml.
name: Smoke Test

on:
  push:
    branches: [main, pr-cleanup-1]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check server.js
        run: node --check server.js

      - name: Syntax check all route files
        run: |
          for f in routes/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Syntax check all service files
        run: |
          for f in services/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Syntax check all core files
        run: |
          for f in core/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Completion overclaim guard (Wave 0 item 2)
        run: npm run completion:overclaim:verify

      - name: Run existing tests
        run: npm test --if-present
        env:
          NODE_ENV: test
          # Import-resolution/smoke tests load real route modules, whose import
          # chain calls loadRuntimeEnv() (config/runtime-env.js) which hard-throws
          # without COMMAND_CENTER_KEY. A dummy value lets modules import so the
          # tests can do their real job (catch missing exports / boot crashes).
          # This is NOT a secret — production supplies the real key via Railway.
          COMMAND_CENTER_KEY: ci-import-smoke-dummy-key

      - name: Record CI evidence (memory system)
        if: success()
        run: node scripts/record-ci-evidence.mjs --all-js
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}