# SYNOPSIS: yml — .github/workflows/railway-deploy.yml.
name: Deploy to Railway

on:
  # Tip 2026-07-15: push-triggered deploys from GOVERNED-AUTONOMOUS-* flooded Railway
  # (Application not found). Manual / workflow_dispatch only until tip is stable.
  workflow_dispatch:
    inputs:
      service_name:
        description: "Railway service name (direct GraphQL fallback only)"
        required: false
        default: "lumin-web"
      environment_name:
        description: "Railway environment name (direct GraphQL fallback only)"
        required: false
        default: "production"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (fail fast before deploy)
        run: |
          node --check server.js
          for f in routes/*.js services/*.js core/*.js; do
            node --check "$f" || exit 1
          done

      - name: Deploy to Railway
        run: node scripts/railway-github-deploy.mjs
        env:
          # Preferred: live lumin-web managed-env (vault already has correct service IDs + token)
          APP_URL: ${{ secrets.APP_URL }}
          PUBLIC_BASE_URL: ${{ secrets.APP_URL }}
          COMMAND_CENTER_KEY: ${{ secrets.COMMAND_CENTER_KEY }}
          # Fallback: direct GraphQL (stale RAILWAY_TOKEN is why CI was failing post-cutover)
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
          RAILWAY_SERVICE_NAME: ${{ github.event.inputs.service_name || vars.RAILWAY_SERVICE_NAME }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_ENVIRONMENT_NAME: ${{ github.event.inputs.environment_name || vars.RAILWAY_ENVIRONMENT_NAME }}
          GITHUB_SHA: ${{ github.sha }}
