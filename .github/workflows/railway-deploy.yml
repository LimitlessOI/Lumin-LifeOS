# SYNOPSIS: yml — .github/workflows/railway-deploy.yml.
name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service_name:
        description: "Railway service name"
        required: false
        default: "lumin-web"
      environment_name:
        description: "Railway environment name"
        required: false
        default: "production"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (fail fast before deploy)
        run: |
          node --check server.js
          for f in routes/*.js services/*.js core/*.js; do
            node --check "$f" || exit 1
          done

      - name: Deploy to Railway
        run: node scripts/railway-github-deploy.mjs
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_NAME: ${{ github.event.inputs.service_name || vars.RAILWAY_SERVICE_NAME }}
          RAILWAY_ENVIRONMENT_NAME: ${{ github.event.inputs.environment_name || vars.RAILWAY_ENVIRONMENT_NAME }}
          GITHUB_SHA: ${{ github.sha }}
