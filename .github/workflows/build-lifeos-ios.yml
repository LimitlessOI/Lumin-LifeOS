# SYNOPSIS: yml — .github/workflows/build-lifeos-ios.yml.
# Build LifeOS iOS project + ad-hoc IPA (no App Store).
# Requires GitHub secrets: IOS_P12_BASE64, IOS_P12_PASSWORD, IOS_PROFILE_BASE64, APPLE_TEAM_ID
name: Build LifeOS iOS IPA

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Commit IPA to main and deploy to Railway (/install OTA)'
        type: boolean
        default: true

concurrency:
  group: build-lifeos-ios
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Add iOS platform
        run: |
          if [ ! -d ios ]; then npx cap add ios; fi
          npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Import signing certificate
        if: env.IOS_P12_BASE64 != ''
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD || 'lifeos-ci' }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$IOS_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install provisioning profile
        if: env.IOS_PROFILE_BASE64 != ''
        env:
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/lifeos.mobileprovision

      - name: Build and export IPA
        if: env.IOS_P12_BASE64 != '' && env.IOS_PROFILE_BASE64 != ''
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/LifeOS.xcarchive" \
            archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/LifeOS.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist mobile/ios/ota/ExportOptions-adhoc.plist
          cp "$RUNNER_TEMP/export/"*.ipa public/downloads/lifeos.ipa
          LIFEOS_IPA=public/downloads/lifeos.ipa node scripts/build-lifeos-ios-adhoc.mjs

      - name: Signing secrets missing
        if: env.IOS_P12_BASE64 == '' || env.IOS_PROFILE_BASE64 == ''
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          echo "HALT: iOS signed IPA requires GitHub secrets:"
          echo "  IOS_P12_BASE64, IOS_P12_PASSWORD, IOS_PROFILE_BASE64, APPLE_TEAM_ID"
          echo "iPhone today: Safari → /install → Add to Home Screen (PWA)."
          exit 1

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lifeos-ipa
          path: |
            public/downloads/lifeos.ipa
            public/downloads/lifeos-ios.plist
            public/downloads/release.json
          retention-days: 30

      - name: Publish to main (Railway deploy)
        if: |
          success() &&
          ((github.event_name == 'workflow_dispatch' && inputs.publish == true) ||
           (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f public/downloads/lifeos.ipa public/downloads/lifeos-ios.plist public/downloads/release.json
          if [ -d ios ] && [ -n "$(git status --porcelain ios)" ]; then
            git add ios/
          fi
          if git diff --staged --quiet; then
            echo "No iOS changes to commit."
            exit 0
          fi
          git commit -m "[mobile] Build LifeOS iOS IPA for direct install"
          git push
