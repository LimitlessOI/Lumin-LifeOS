# SYNOPSIS: yml — .github/workflows/build-lifeos-android.yml.
# Build LifeOS Android APK for direct download (no Play Store).
# After success: APK lands on Railway via auto-commit → /install shows Download.
name: Build LifeOS Android APK

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Commit APK to main and deploy to Railway (/install download)'
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'capacitor.config.json'
      - 'mobile/**'
      - 'scripts/build-lifeos-android-apk.mjs'
      - '.github/workflows/build-lifeos-android.yml'

concurrency:
  group: build-lifeos-android
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Install SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: npm run mobile:build:android
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Verify APK
        run: |
          test -f public/downloads/lifeos.apk
          ls -lh public/downloads/lifeos.apk
          jq '.android.available' public/downloads/release.json | grep -q true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifeos-apk
          path: |
            public/downloads/lifeos.apk
            public/downloads/release.json
          retention-days: 30

      - name: Publish to main (Railway deploy)
        if: |
          (github.event_name == 'workflow_dispatch' && inputs.publish == true) ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f public/downloads/lifeos.apk public/downloads/release.json
          if git diff --staged --quiet; then
            echo "No APK changes to commit."
            exit 0
          fi
          git commit -m "[mobile] Build LifeOS Android APK for direct install"
          git push
