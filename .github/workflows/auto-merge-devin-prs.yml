# SYNOPSIS: yml — .github/workflows/auto-merge-devin-prs.yml — auto-merge green Devin-authored PRs into main so the system ships its own work.
name: Auto-Merge Devin PRs

# Founder authorization (Adam): the system merges its own PRs. This workflow
# merges a PR into main ONLY when ALL of these hold:
#   - the PR author is the Devin bot (devin-ai-integration[bot])
#   - the PR targets `main`, is open, and is not a draft
#   - every check on the head commit has concluded SUCCESS (no failures/pending)
#   - GitHub reports the PR mergeable (no conflicts)
#
# Busy-repo conflict auto-resolve: the autonomous build loop commits to `main`
# every few minutes, and the synopsis index + BUILD_QUEUE.json are co-committed
# by both the loop and every PR — so a green PR constantly re-conflicts on those
# GENERATED files faster than a human can rebase (the "loop and PR fight over the
# same files" race). When a green Devin PR conflicts ONLY in a whitelisted set of
# generated files, this workflow rebases the PR onto main, resolves those files by
# regenerating them from main's state, and pushes — turning the PR mergeable so
# the next event merges it. If any NON-whitelisted file conflicts, it does NOT
# touch the PR (a real code conflict still needs a human/Devin).
#
# Halt switch: create/point `.github/AUTO_MERGE_OFF` (any content) on main to disable.

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, labeled]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["*"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.event.check_suite.head_sha || github.run_id }}
  cancel-in-progress: false

jobs:
  auto-merge:
    name: Auto-merge green Devin PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Bail if kill-switch present
        id: killswitch
        run: |
          if [ -f .github/AUTO_MERGE_OFF ]; then
            echo "Auto-merge disabled via .github/AUTO_MERGE_OFF — exiting."
            echo "disabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "disabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve candidate PR numbers
        if: steps.killswitch.outputs.disabled != 'true'
        id: candidates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.check_suite.head_sha || github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          nums=""
          if [ "$EVENT_NAME" = "pull_request_target" ] && [ -n "${PR_NUMBER:-}" ]; then
            nums="$PR_NUMBER"
          elif [ -n "${HEAD_SHA:-}" ]; then
            # Find open PRs whose head is this commit.
            nums="$(gh pr list --state open --base main --json number,headRefOid \
              --jq "[.[] | select(.headRefOid==\"$HEAD_SHA\") | .number] | join(\" \")")"
          fi
          echo "numbers=$nums" >> "$GITHUB_OUTPUT"
          echo "Candidate PRs: '$nums'"

      - name: Merge each PR that is Devin-authored and fully green
        if: steps.killswitch.outputs.disabled != 'true' && steps.candidates.outputs.numbers != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Whitelist of GENERATED files the loop and every PR co-commit. Conflicts
          # confined to these are auto-resolved against main; anything else is a
          # real conflict and blocks (needs a human/Devin).
          GENERATED_GLOBS: 'builderos-reboot/governance/REPO_FILE_SYNOPSIS_INDEX.json docs/products/*/BUILD_QUEUE.json'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          is_generated() {
            # Return 0 if path $1 matches a whitelisted generated glob.
            case "$1" in
              builderos-reboot/governance/REPO_FILE_SYNOPSIS_INDEX.json) return 0 ;;
            esac
            case "$1" in
              docs/products/*/BUILD_QUEUE.json) return 0 ;;
            esac
            return 1
          }

          for n in ${{ steps.candidates.outputs.numbers }}; do
            echo "::group::Evaluating PR #$n"
            meta="$(gh pr view "$n" --json number,author,isDraft,state,baseRefName,mergeable,headRefName,statusCheckRollup)"

            author="$(echo "$meta" | jq -r '.author.login')"
            is_draft="$(echo "$meta" | jq -r '.isDraft')"
            state="$(echo "$meta" | jq -r '.state')"
            base="$(echo "$meta" | jq -r '.baseRefName')"
            mergeable="$(echo "$meta" | jq -r '.mergeable')"
            head_ref="$(echo "$meta" | jq -r '.headRefName')"

            # gh's GraphQL surfaces the Devin bot as `app/devin-ai-integration`,
            # while the REST payload uses `devin-ai-integration[bot]`. Match either
            # (any login containing devin-ai-integration) so the gate does not
            # silently skip every Devin PR — the bug that made this Action a no-op.
            case "$author" in
              *devin-ai-integration*) : ;;
              *) echo "skip: author=$author not Devin bot"; echo '::endgroup::'; continue ;;
            esac
            if [ "$state" != "OPEN" ]; then echo "skip: state=$state"; echo '::endgroup::'; continue; fi
            if [ "$is_draft" = "true" ]; then echo "skip: draft"; echo '::endgroup::'; continue; fi
            if [ "$base" != "main" ]; then echo "skip: base=$base"; echo '::endgroup::'; continue; fi

            # Every check on the head commit must have concluded green
            # (SUCCESS/NEUTRAL/SKIPPED). Any FAILURE/pending/in-progress blocks.
            # We evaluate this BEFORE any auto-resolve so we only ever rebase a PR
            # whose CODE is already vetted; auto-resolve then touches only generated
            # files, leaving the vetted code diff unchanged.
            total="$(echo "$meta" | jq '[.statusCheckRollup[]?] | length')"
            if [ "${total:-0}" -eq 0 ]; then echo "skip: no checks reported yet"; echo '::endgroup::'; continue; fi
            green="$(echo "$meta" | jq '[.statusCheckRollup[]? | (.conclusion? // .state? // "PENDING") | ascii_upcase] | all(. == "SUCCESS" or . == "NEUTRAL" or . == "SKIPPED")')"
            if [ "$green" != "true" ]; then echo "skip: not all $total checks green"; echo '::endgroup::'; continue; fi

            # Busy-repo auto-resolve: if the loop advanced main and the PR now only
            # conflicts in whitelisted generated files, rebase+resolve+push so it
            # becomes mergeable. Code is unchanged, so no re-review is needed.
            if [ "$mergeable" = "CONFLICTING" ]; then
              echo "PR #$n conflicts — attempting generated-file auto-resolve against main."
              git fetch --depth=50 origin "main" "$head_ref"
              git checkout -B "$head_ref" "origin/$head_ref"
              if git merge --no-edit "origin/main"; then
                echo "merge clean (no real conflict) — pushing refreshed branch."
              else
                conflicts="$(git diff --name-only --diff-filter=U)"
                echo "conflicted files:"; echo "$conflicts"
                only_generated=true
                for f in $conflicts; do
                  if ! is_generated "$f"; then echo "NON-generated conflict: $f — leaving PR for human."; only_generated=false; break; fi
                done
                if [ "$only_generated" != "true" ]; then git merge --abort; echo '::endgroup::'; continue; fi
                # Take main's version of each generated file, then regenerate the
                # synopsis index so it matches the merged tree (PR code + main state).
                for f in $conflicts; do git checkout --theirs "$f"; git add "$f"; done
                node scripts/generate-file-synopsis-index.mjs || echo "index regen skipped (non-fatal)"
                git add -A
                git commit --no-verify -m "ci(auto-merge): resolve generated-file conflicts (index/BUILD_QUEUE) against main"
              fi
              git push --no-verify origin "HEAD:$head_ref"
              # Give GitHub a moment to recompute mergeability on the new head.
              for i in 1 2 3 4 5 6; do
                sleep 10
                mergeable="$(gh pr view "$n" --json mergeable --jq '.mergeable')"
                [ "$mergeable" != "CONFLICTING" ] && break
              done
              echo "post-resolve mergeable=$mergeable"
            fi

            if [ "$mergeable" = "CONFLICTING" ]; then echo "skip: still conflicting after auto-resolve"; echo '::endgroup::'; continue; fi

            echo "PR #$n is Devin-authored, open, $total checks all green, mergeable=$mergeable — merging."
            gh pr merge "$n" --merge --delete-branch || echo "merge attempt failed for #$n (branch protection or race) — will retry on next event"
            echo '::endgroup::'
          done
