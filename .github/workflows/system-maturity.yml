# SYNOPSIS: yml — .github/workflows/system-maturity.yml.
# Composite quality gate for SYSTEM_MATURITY_PROGRAM.md
# See docs/SYSTEM_MATURITY_PROGRAM.md and docs/QUICK_LAUNCH.md (Real AI Council)

name: System maturity

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci --prefer-offline --no-audit 2>/dev/null || npm install --no-audit
      - name: System maturity check (CI mode — see script for skips)
        env:
          CI: "true"
          # Maturity check runs the test suite, which imports real route modules
          # whose import chain calls loadRuntimeEnv() (hard-throws without
          # COMMAND_CENTER_KEY). Dummy value lets modules import; NOT a secret —
          # production supplies the real key via Railway.
          COMMAND_CENTER_KEY: ci-import-smoke-dummy-key
        run: npm run verify:maturity
