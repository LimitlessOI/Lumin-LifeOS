<!-- SYNOPSIS: HTML page — Progress Email Template. -->
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #007BFF;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        .content {
            margin: 20px 0;
        }
        .footer {
            text-align: center;
            color: #888888;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Weekly Progress Update</h1>
        </div>
        <div class="content">
            <h2>Hello [Recipient Name],</h2>
            <p>Here is your progress update for the week:</p>
            <ul>
                <li>Task 1: Completed</li>
                <li>Task 2: In Progress</li>
                <li>Task 3: Pending</li>
            </ul>
            <p>Keep up the great work!</p>
        </div>
        <div class="footer">
            <p>&copy; 2023 Progress Update Inc.</p>
        </div>
    </div>
</body>
</html>
