<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Collections Control Center</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; margin: 0; background: #0b1020; color: #edf2f7; overflow-x: hidden; }
    .wrap { max-width: min(1600px, 100vw); margin: 0 auto; padding: 24px; box-sizing: border-box; }
    .hero { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:20px; }
    .eyebrow { color:#8aa4ff; text-transform:uppercase; letter-spacing:.08em; font-size:12px; }
    h1, h2, h3, p { margin: 0; }
    .grid { display:grid; gap:16px; margin-bottom:16px; }
    .grid.four { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .grid.two { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .card { background:#131a2e; border:1px solid #27304a; border-radius:14px; padding:16px; box-shadow:0 10px 30px rgba(0,0,0,.18); overflow-wrap: anywhere; word-break: break-word; }
    .stat span, label, .hint { color:#98a5c3; font-size:12px; }
    .stat strong { display:block; margin-top:8px; font-size:20px; }
    .badge { display:inline-block; padding:6px 10px; border-radius:999px; font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
    .badge.ok { background:#113b2d; color:#7ef0b8; }
    .badge.warn { background:#4a3a12; color:#ffd666; }
    .badge.bad { background:#4a1f28; color:#ff9db0; }
    .toolbar { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
    .toolbar > div { display:flex; flex-direction:column; gap:6px; }
    input, textarea, select { background:#0f1528; color:#edf2f7; border:1px solid #27304a; border-radius:10px; padding:10px 12px; min-width:0; width:100%; box-sizing:border-box; }
    textarea { min-height:140px; width:100%; resize:vertical; }
    button { background:#3559d8; color:#fff; border:0; border-radius:10px; padding:10px 12px; cursor:pointer; }
    button.ghost { background:#27304a; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { text-align:left; padding:10px 8px; border-bottom:1px solid #27304a; vertical-align:top; }
    th { color:#98a5c3; font-weight:600; }
    .split { display:grid; gap:16px; grid-template-columns: 1.2fr .8fr; }
    @media (max-width: 980px) { .split { grid-template-columns: 1fr; } }
    .stack { display:grid; gap:10px; }
    .muted { color:#98a5c3; }
    .workspace, .main-workspace, .grid, .card, .stack, .utility-sidebar, .utility-sidebar-body { min-width: 0; }
    .workspace { display:grid; gap:16px; align-items:start; }
    .workspace.with-utilities { grid-template-columns: minmax(0, 1fr) minmax(300px, 380px); }
    .workspace.with-utilities.utilities-bottom { grid-template-columns: 1fr; }
    .main-workspace { min-width: 0; display:grid; gap:16px; }
    .utility-sidebar { min-width: 300px; width: min(34vw, 380px); max-width: 420px; resize: horizontal; overflow: auto; justify-self: end; position: sticky; top: 24px; display:grid; gap:16px; }
    .utility-sidebar.collapsed { width: 220px; min-width: 220px; resize: none; }
    .workspace.with-utilities.utilities-bottom .utility-sidebar { position: static; width: auto; min-width: 0; max-width: none; resize: none; justify-self: stretch; }
    .utility-sidebar-head { padding:12px 16px; }
    .utility-sidebar-body { display:grid; gap:16px; }
    .utility-sidebar .grid.two, .utility-sidebar .split { grid-template-columns: 1fr; }
    .utility-sidebar .grid.four { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
    .utility-sidebar .card, .utility-sidebar input, .utility-sidebar textarea, .utility-sidebar select { min-width: 0; max-width: 100%; }
    .assistant-card { display:grid; gap:12px; }
    .assistant-history { max-height:380px; overflow:auto; }
    .row-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .tools-card summary { cursor:pointer; font-weight:600; }
    details.card > summary { cursor:pointer; font-weight:700; list-style:none; }
    details.card > summary::-webkit-details-marker { display:none; }
    details.card > summary::after { content:'Collapse'; margin-left:8px; color:#98a5c3; font-size:12px; font-weight:500; }
    details.card:not([open]) > summary::after { content:'Expand'; }
    details.card > summary + * { margin-top:12px; }
    .kpi-grid .card { min-height:92px; }
    pre { white-space:pre-wrap; word-break:break-word; background:#0f1528; border:1px solid #27304a; border-radius:10px; padding:12px; }
    .small { font-size:12px; }
    .account-board { display:grid; gap:10px; max-height:700px; overflow:auto; }
    .account-card { position:relative; width:100%; text-align:left; background:#0f1528; border:1px solid #27304a; border-radius:12px; padding:12px 12px 14px 52px; display:grid; gap:10px; overflow:hidden; }
    .account-card[data-state="red"] { border-color:#ef476f; }
    .account-card[data-state="yellow"] { border-color:#f0b429; }
    .account-card[data-state="green"] { border-color:#26c281; }
    .account-card.selected { border-color:#5c7cff; box-shadow:0 0 0 1px #5c7cff inset; }
    .account-card-top, .progress-label, .account-detail-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
    .progress-track { width:100%; height:10px; background:#1a223a; border-radius:999px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:999px; }
    .progress-fill.ok { background:#26c281; }
    .progress-fill.warn { background:#f0b429; }
    .progress-fill.bad { background:#ef476f; }
    .account-meta { font-size:12px; color:#98a5c3; }
    .account-actions-inline { display:flex; gap:6px; flex-wrap:wrap; }
    .account-ring { position:absolute; left:12px; top:12px; width:30px; height:30px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; border:2px solid currentColor; }
    .account-ring.red { color:#ff9db0; background:#4a1f28; }
    .account-ring.yellow { color:#ffd666; background:#4a3a12; }
    .account-ring.green { color:#7ef0b8; background:#113b2d; }
    .account-hover-card { display:none; position:absolute; left:12px; right:12px; bottom:12px; background:rgba(11,16,32,.96); border:1px solid #2d3b5f; border-radius:12px; padding:12px; color:#edf2f7; box-shadow:0 12px 28px rgba(0,0,0,.3); }
    .account-card:hover .account-hover-card, .account-card:focus-visible .account-hover-card { display:block; }
    .detail-list { margin:8px 0 0 18px; padding:0; display:grid; gap:6px; }
    .todo-item { background:#101726; border:1px solid #27304a; border-radius:14px; padding:14px; }
    .todo-item[data-urgency="red"] { border-color:#6b2430; }
    .todo-item[data-urgency="yellow"] { border-color:#6b5420; }
    .todo-head { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:8px; }
    @media (max-width: 1520px) {
      .workspace.with-utilities { grid-template-columns: 1fr; }
      .utility-sidebar { position:static; width:auto; min-width:0; max-width:none; resize:none; }
    }
    @media (max-width: 760px) {
      .wrap { padding: 16px; }
      .hero { flex-direction:column; }
    }

    /* ── Tooltip system ───────────────────────────────────────────── */
    [data-tip] { position: relative; }
    [data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e2d50;
      color: #edf2f7;
      font-size: 12px;
      line-height: 1.5;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #3a4f7a;
      white-space: normal;
      width: max-content;
      max-width: 280px;
      box-shadow: 0 6px 20px rgba(0,0,0,.4);
      z-index: 100;
      pointer-events: none;
      text-transform: none;
      font-weight: normal;
      letter-spacing: 0;
    }
    [data-tip]:hover::before {
      content: '';
      position: absolute;
      bottom: calc(100% + 3px);
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #3a4f7a;
      z-index: 101;
      pointer-events: none;
    }
    /* keep tooltips on-screen at edges */
    [data-tip-left]:hover::after { left: 0; transform: none; }
    [data-tip-right]:hover::after { left: auto; right: 0; transform: none; }
    /* Working tools rail is narrow; centered ::after tooltips clip on the left — align to the right inside the sidebar */
    .utility-sidebar [data-tip]:not([data-tip-left]):hover::after {
      left: auto;
      right: 0;
      transform: none;
      max-width: min(300px, calc(100vw - 24px));
    }
    .utility-sidebar [data-tip]:not([data-tip-left]):hover::before {
      left: auto;
      right: 14px;
      transform: none;
    }
    h2[data-tip], h3[data-tip] { cursor: help; display: inline-flex; align-items: center; gap: 6px; }
    h2[data-tip]::before, h3[data-tip]::before { content: none; }
    h2[data-tip]:hover::before, h3[data-tip]:hover::before { content: ''; }
  </style>
</head>

  <script src="/shared/lifeos-voice-chat.js?v=20260330"></script>
