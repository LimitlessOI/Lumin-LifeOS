<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: LinkedIn Post Preview -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post Preview</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f3f2ef;
        }
        .post-container {
            background-color: #ffffff;
            border: 1px solid #d1d1d1;
            border-radius: 8px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            align-items: center;
        }
        .profile-pic {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .user-info {
            font-size: 14px;
        }
        .user-info .name {
            font-weight: bold;
        }
        .content {
            margin-top: 15px;
            font-size: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="post-container">
        <div class="header">
            <img src="profile-pic.jpg" alt="Profile Picture" class="profile-pic">
            <div class="user-info">
                <div class="name">John Doe</div>
                <div class="position">Software Engineer at Company</div>
            </div>
        </div>
        <div class="content">
            Excited to share that I've been working on an innovative project that aims to revolutionize the way we approach technology. Stay tuned for updates!
        </div>
    </div>
</body>
</html>
