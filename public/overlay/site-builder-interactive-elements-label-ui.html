<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Interactive Elements Label UI -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Elements Label UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .label-editor {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .label-input {
            margin-right: 10px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .edit-button {
            padding: 5px 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="labelUI">
        <div class="label-editor">
            <input type="text" class="label-input" id="labelInput" placeholder="Enter label">
            <button class="edit-button" onclick="updateLabel()">Edit Label</button>
        </div>
        <div id="labelDisplay">
            Current Label: <span id="currentLabel"></span>
        </div>
    </div>
    <script>
        function updateLabel() {
            var inputElement = document.getElementById('labelInput');
            var currentLabel = document.getElementById('currentLabel');
            currentLabel.textContent = inputElement.value;
        }
    </script>
</body>
</html>
