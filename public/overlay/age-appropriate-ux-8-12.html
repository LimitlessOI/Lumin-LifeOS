<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Age Appropriate UX for 8-12 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Appropriate UX for 8-12</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #ffcc00;
            padding: 10px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        nav {
            background-color: #ffdd57;
            padding: 10px;
            display: flex;
            justify-content: space-around;
        }
        nav a {
            color: #333;
            text-decoration: none;
            font-size: 18px;
        }
        main {
            padding: 20px;
            text-align: center;
        }
        .button {
            background-color: #ffbb33;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        .content-box {
            background-color: #fff8dc;
            border: 2px solid #ffdd57;
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
            text-align: left;
        }
    </style>
</head>
<body>
    <header>Welcome to Our Fun World!</header>
    <nav>
        <a href="#games">Games</a>
        <a href="#activities">Activities</a>
        <a href="#quizzes">Quizzes</a>
        <a href="#profile">Profile</a>
    </nav>
    <main>
        <div class="content-box">
            <h2>Explore and Learn</h2>
            <p>Welcome to a world of fun and learning. Here you'll find exciting games, quizzes, and activities designed just for you!</p>
            <button class="button" onclick="alert('Let\'s start the fun!')">Get Started</button>
        </div>
    </main>
</body>
</html>
