<!-- SYNOPSIS: LifeOS overlay UI — Site Builder Save Confirmation. -->
<div id="save-status-bar" style="position: absolute; top: 0; width: 100%; background: #f0f0f0; color: #888; text-align: center; padding: 10px; transition: opacity 1s ease; opacity: 1;">
  Unsaved changes
</div>
<script>
  document.addEventListener('sb:saved', function(event) {
    const bar = document.getElementById('save-status-bar');
    const savedAt = new Date(event.detail.savedAt);
    const formattedTime = savedAt.toTimeString().split(' ')[0];
    bar.textContent = `✓ Saved at ${formattedTime}`;
    bar.style.color = '#000';
    bar.style.opacity = '1';

    setTimeout(() => {
      bar.style.opacity = '0';
    }, 4000);
  });
</script>
