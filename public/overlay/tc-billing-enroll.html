<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Agent Enrollment -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Enrollment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            margin: 10px 0 5px;
        }
        select, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            select, button {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Enroll as Agent</h2>
        <form id="enrollmentForm">
            <label for="planTier">Select Plan Tier:</label>
            <select id="planTier" name="planTier" required>
                <option value="starter">Starter</option>
                <option value="pro">Pro</option>
                <option value="enterprise">Enterprise</option>
            </select>
            <button type="submit">Proceed to Checkout</button>
        </form>
    </div>
    <script>
        (function() {
            document.getElementById('enrollmentForm').addEventListener('submit', function(event) {
                event.preventDefault();
                var planTier = document.getElementById('planTier').value;
                var data = { planTier: planTier };

                fetch('/api/tc/billing/checkout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.stripeCheckoutUrl) {
                        window.location.href = data.stripeCheckoutUrl;
                    } else {
                        alert('Error: Could not retrieve Stripe checkout URL.');
                    }
                })
                .catch(error => console.error('Error:', error));
            });

            var urlParams = new URLSearchParams(window.location.search);
            var stripeSubscriptionId = urlParams.get('stripeSubscriptionId');
            var planTier = urlParams.get('planTier');

            if (stripeSubscriptionId && planTier) {
                fetch(`/api/tc/billing/enroll?stripeSubscriptionId=${stripeSubscriptionId}&planTier=${planTier}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('Enrollment confirmed!');
                    } else {
                        alert('Enrollment failed.');
                    }
                })
                .catch(error => console.error('Error:', error));
            }
        })();
    </script>
</body>
</html>
