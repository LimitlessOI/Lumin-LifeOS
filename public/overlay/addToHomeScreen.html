<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Add to Home Screen -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add to Home Screen</title>
    <style>
        #addToHomeScreen {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background-color: #ffffff;
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 90%;
            max-width: 400px;
            font-family: Arial, sans-serif;
            z-index: 1000;
        }
        #addToHomeScreen button {
            padding: 8px 12px;
            background-color: #007bff;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="addToHomeScreen">
        <span>Add this app to your home screen for quick access.</span>
        <button onclick="addToHomeScreen()">Add</button>
    </div>
    <script>
        function addToHomeScreen() {
            const promptEvent = window.deferredPrompt;
            if (promptEvent) {
                promptEvent.prompt();
                promptEvent.userChoice.then(choiceResult => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the A2HS prompt');
                    } else {
                        console.log('User dismissed the A2HS prompt');
                    }
                    window.deferredPrompt = null;
                });
            }
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
        });
    </script>
</body>
</html>
