<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LifeOS — Communication</title>
  <link rel="stylesheet" href="/shared/lifeos-chat-composer.css?v=20260525-1">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --input-bg: #0d1117;
      --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
      --success: #3fb950; --warning: #d29922; --error: #f85149;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; }
    .topbar h1 { margin: 0; font-size: 16px; font-weight: 700; }
    .topbar a { color: var(--accent); font-size: 12px; text-decoration: none; }
    .layout { display: grid; grid-template-columns: 1fr 320px; gap: 0; min-height: calc(100vh - 48px); }
    @media(max-width:900px){ .layout { grid-template-columns: 1fr; } .sidebar { order: -1; max-height: 180px; overflow-y: auto; } }
    @media(max-width:720px){ .topbar a { font-size:11px; } .controls { display:none; } .controls.open { display:flex; } .btn-comm-options { display:block; width:100%; border:none; border-bottom:1px solid var(--border); background:var(--surface); color:var(--text-muted); font-size:11px; padding:8px 12px; text-align:left; cursor:pointer; } }
    @media(min-width:721px){ .btn-comm-options { display:none; } }
    .main { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
    .controls { padding: 12px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    select, textarea, input { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-family: inherit; }
    select { padding: 6px 8px; font-size: 12px; }
    .thread { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .composer { padding: 12px; border-top: 1px solid var(--border); }
    .composer textarea { width: 100%; min-height: 72px; padding: 10px; font-size: 13px; resize: vertical; }
    .composer-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
    .btn { border: 1px solid var(--border); background: var(--surface); color: var(--text); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .btn-warning { background: var(--warning); color: #000; border-color: var(--warning); }
    .msg { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; max-width: 92%; }
    .msg.adam { align-self: flex-end; border-color: rgba(88,166,255,.4); }
    .msg-head { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
    .speaker { font-weight: 700; font-size: 12px; color: var(--accent); }
    .pill { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,.08); }
    .pill-verified { background: rgba(63,185,80,.2); color: var(--success); }
    .pill-partial { background: rgba(210,153,34,.2); color: var(--warning); }
    .pill-unverified { background: rgba(248,81,73,.15); color: var(--error); }
    .msg-body { font-size: 13px; line-height: 1.55; white-space: pre-wrap; }
    .meeting-turn { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); }
    .sidebar { background: var(--surface); padding: 12px; overflow-y: auto; }
    .hub-section { margin-bottom: 16px; }
    .hub-title { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 8px; }
    .hub-item { font-size: 12px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.04); cursor: pointer; }
    .hub-item:hover { color: var(--accent); }
    .search-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .search-row input { flex: 1; padding: 6px 8px; font-size: 12px; }
    .revenue-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 11px; }
    .voice-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
    .voice-transcript { flex: 1; min-width: 120px; font-size: 11px; min-height: 32px; }
    .comm-help-icon { display: inline-flex; width: 14px; height: 14px; align-items: center; justify-content: center; border-radius: 50%; background: rgba(88,166,255,.2); color: var(--accent); font-size: 9px; margin-left: 4px; cursor: help; }
    .comm-help-tooltip { display: none; position: absolute; z-index: 9999; max-width: 300px; padding: 10px; background: #1e2640; border: 1px solid var(--accent); border-radius: 8px; font-size: 11px; line-height: 1.5; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    .comm-help-more { margin-top: 4px; color: var(--text-muted); font-size: 10px; }
    .comm-help-more-btn { margin-top: 6px; padding: 2px 8px; font-size: 10px; background: transparent; border: 1px solid var(--border); color: var(--accent); border-radius: 4px; cursor: pointer; }
    [data-comm-help] { position: relative; }
    .empty { color: var(--text-muted); font-size: 12px; font-style: italic; }
    .cc-recording { animation: pulse 1.2s infinite; }
    @keyframes pulse { 50% { opacity: .6; } }
  </style>
</head>
<body>
  <header class="topbar">
    <h1 data-comm-help="comm-hub-priorities">LifeOS Communication</h1>
    <span style="font-size:11px;color:var(--text-muted)">Direct system bridge · human-readable output</span>
    <a href="/voice-rail">Voice Rail →</a>
    <a href="/lifeos-command-center">Dashboard →</a>
    <a href="/activate">Key / Activate</a>
  </header>

  <div class="layout">
    <section class="main">
      <button type="button" class="btn-comm-options" id="btn-comm-options">Options — mode · domain</button>
      <div class="controls" id="comm-controls">
        <label data-comm-help="cc-mode" style="font-size:11px;color:var(--text-muted)">Mode</label>
        <select id="comm-mode"></select>
        <select id="comm-domain"><option value="">Domain (optional)</option></select>
        <button type="button" class="btn" id="btn-meeting" data-comm-help="comm-meeting">Meeting</button>
        <button type="button" class="btn" id="btn-revenue" data-comm-help="comm-revenue">Revenue brief</button>
      </div>

      <div class="thread" id="thread">
        <div class="empty">Talk to LifeOS — pick a mode and ask anything.</div>
      </div>

      <div id="comm-attachment-strip" class="attachment-strip" hidden></div>
      <input type="file" id="comm-file-input" hidden multiple accept="image/*,.pdf,.txt,.md,.csv" tabindex="-1" aria-hidden="true">
      <div class="chat-input-bar">
        <button type="button" class="btn-attach" id="comm-btn-attach" aria-label="Add photos or files">+</button>
        <div class="chat-input-inner">
          <textarea id="comm-input" placeholder="Message the system directly…" rows="4"></textarea>
        </div>
        <button type="button" class="btn-send-round" id="btn-send">Send</button>
      </div>
      <div class="voice-row" data-comm-help="cc-voice-record" style="padding:0 12px 8px">
        <button type="button" class="btn btn-warning" id="btn-record">Record</button>
        <textarea id="voice-transcript" class="voice-transcript" placeholder="Live transcript" readonly rows="1"></textarea>
        <span id="voice-status" style="font-size:10px;color:var(--text-muted)">Voice idle</span>
      </div>
      <div class="composer-actions" style="padding:0 12px 12px">
        <button type="button" class="btn" id="btn-speak" disabled>Speak last</button>
      </div>
    </section>

    <aside class="sidebar">
      <div class="search-row">
        <input id="search-q" placeholder="Search conversations…" />
        <button type="button" class="btn" id="btn-search">Go</button>
      </div>
      <div class="hub-section" data-comm-help="comm-hub-priorities">
        <div class="hub-title">Waiting decisions</div>
        <div id="hub-decisions"><div class="empty">Loading…</div></div>
      </div>
      <div class="hub-section" data-comm-help="comm-revenue">
        <div class="hub-title">Revenue opportunities</div>
        <div id="hub-revenue"><div class="empty">Tap Revenue brief</div></div>
      </div>
      <div class="hub-section">
        <div class="hub-title">Latest builds</div>
        <div id="hub-builds"><div class="empty">Loading…</div></div>
      </div>
      <div class="hub-section">
        <div class="hub-title">Recent conversations</div>
        <div id="hub-convos"><div class="empty">Loading…</div></div>
      </div>
    </aside>
  </div>

  <script src="/shared/lifeos-comm-help.js"></script>
  <script src="/shared/lifeos-chat-composer.js?v=20260525-1"></script>
  <script src="/overlay/lifeos-communication-os.js"></script>
</body>
</html>
