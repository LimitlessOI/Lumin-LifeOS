<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Ask Taloa parent mode — meltdown triage -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Mode — LifeOS</title>
  <script src="/overlay/lifeos-theme.js"></script>
  <script src="/overlay/lifeos-bootstrap.js"></script>
  <style>
    body { margin:0; font-family:Georgia,'Iowan Old Style',serif; background:#14110f; color:#f4efe8; }
    .root { max-width:640px; margin:0 auto; padding:28px 18px 80px; }
    h1 { margin:0 0 6px; } .sub { color:#b3a89a; margin-bottom:16px; }
    .row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    input, select, button { padding:12px; border-radius:10px; border:1px solid #3a322c; background:#1c1815; color:#f4efe8; font:inherit; }
    button { background:#8a5a3c; border:0; cursor:pointer; }
    .answer { font-size:1.25rem; line-height:1.45; border-left:3px solid #c4a484; padding:12px 14px; margin:16px 0; background:#1a1613; border-radius:0 12px 12px 0; }
    .meta { color:#b3a89a; font-size:.9rem; }
  </style>
</head>
<body>
  <div class="root">
    <h1>Ask Taloa — parent mode</h1>
    <p class="sub">One sentence you can say right now. Developmental read underneath. Not therapy.</p>
    <div class="row">
      <select id="situation">
        <option value="meltdown">Meltdown</option>
        <option value="tantrum">Tantrum</option>
        <option value="sibling_conflict">Sibling conflict</option>
        <option value="screen_pushback">Screen pushback</option>
        <option value="bedtime">Bedtime</option>
      </select>
      <input id="age" type="number" min="1" max="17" placeholder="Age" style="width:90px">
      <button id="ask" type="button">Get line</button>
    </div>
    <div id="answer" class="answer">Ready when you are.</div>
    <div id="read" class="meta"></div>
  </div>
  <script>
    document.getElementById('ask').onclick = async () => {
      const answer = document.getElementById('answer');
      const read = document.getElementById('read');
      answer.textContent = '…';
      read.textContent = '';
      try {
        const r = await fetch('/api/v1/lifeos/parenting-scripts/parent-mode', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            situation: document.getElementById('situation').value,
            child_age: document.getElementById('age').value ? Number(document.getElementById('age').value) : null,
          }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
        answer.textContent = j.answer || j.script || 'I am here. We can take the next small step together.';
        read.textContent = j.developmental_read || '';
      } catch (e) {
        answer.textContent = 'Could not reach parent mode: ' + e.message;
      }
    };
  </script>
</body>
</html>
