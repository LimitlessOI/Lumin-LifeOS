<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Age-Appropriate UX for Ages 4-7 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age-Appropriate UX for Ages 4-7</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
        }
        .button {
            background-color: #ffcc00;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 12px;
        }
        .content {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Welcome to FunLand!</h1>
        <p>Let's explore and learn together!</p>
        <button class="button" onclick="alert('Yay! You clicked me!')">Click Me!</button>
        <div>
            <img src="happy-character.png" alt="Happy character" style="width:200px;">
        </div>
    </div>
</body>
</html>
