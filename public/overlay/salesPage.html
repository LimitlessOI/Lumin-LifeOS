<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Sales Page -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .offer-section {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 20px;
            margin-bottom: 20px;
            background-color: #f9f9f9;
        }
        .offer-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .offer-description {
            font-size: 16px;
            margin-bottom: 10px;
        }
        .offer-price {
            font-size: 20px;
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="offer-section">
            <div class="offer-header">Offer 1: Summer Sale</div>
            <div class="offer-description">Get up to 50% off on all summer clothing.</div>
            <div class="offer-price">$49.99</div>
        </div>
        <div class="offer-section">
            <div class="offer-header">Offer 2: Buy One Get One</div>
            <div class="offer-description">Purchase any item and get another one absolutely free.</div>
            <div class="offer-price">$29.99</div>
        </div>
        <div class="offer-section">
            <div class="offer-header">Offer 3: Free Shipping</div>
            <div class="offer-description">Enjoy free shipping on orders over $100.</div>
            <div class="offer-price">Free</div>
        </div>
    </div>
</body>
</html>
