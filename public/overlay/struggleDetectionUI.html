<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Struggle Detection UI -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struggle Detection UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .overlay {
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .log-event {
            margin-top: 20px;
            font-size: 14px;
            color: #ffcc00;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <h1>Struggle Detected</h1>
        <p>We're here to help! Please check the resources below or contact support.</p>
        <div class="log-event">Log Event: Struggle detected at [timestamp]</div>
    </div>
</body>
</html>
