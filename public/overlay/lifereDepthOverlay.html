<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Depth Overlay -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth Overlay</title>
    <style>
        .depth-overlay {
            position: fixed;
            top: 0;
            right: 0;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            font-family: Arial, sans-serif;
            z-index: 1000;
        }
        .depth-level {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="depth-overlay">
        <div class="depth-level">A</div>
        <div class="depth-level">B</div>
        <div class="depth-level">C</div>
        <div class="depth-level">D</div>
        <div class="depth-level">E</div>
        <div class="depth-level">F</div>
        <div class="depth-level">G</div>
        <div class="depth-level">H</div>
        <div class="depth-level">I</div>
        <div class="depth-level">J</div>
        <div class="depth-level">K</div>
        <div class="depth-level">L</div>
        <div class="depth-level">M</div>
        <div class="depth-level">N</div>
        <div class="depth-level">O</div>
        <div class="depth-level">P</div>
        <div class="depth-level">Q</div>
        <div class="depth-level">R</div>
        <div class="depth-level">S</div>
        <div class="depth-level">T</div>
        <div class="depth-level">U</div>
        <div class="depth-level">V</div>
        <div class="depth-level">W</div>
        <div class="depth-level">X</div>
        <div class="depth-level">Y</div>
        <div class="depth-level">Z</div>
    </div>
</body>
</html>
