<!DOCTYPE html>
<!-- SYNOPSIS: Lumen conversational listening & privacy onboarding -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lumen — Listening Setup</title>
  <link rel="manifest" href="/overlay/lifeos.webmanifest" />
  <meta name="theme-color" content="#6c63ff" />
  <script src="/overlay/lifeos-bootstrap.js"></script>
  <script src="/overlay/lifeos-voice.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #14141c;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --muted: #8888aa;
      --accent: #6c63ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header p { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .back { color: var(--accent); text-decoration: none; font-size: 14px; }
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .bubble {
      max-width: 92%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.45;
      font-size: 15px;
      white-space: pre-wrap;
    }
    .bubble.lumen {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .bubble.user {
      align-self: flex-end;
      background: rgba(108,99,255,0.18);
      border: 1px solid rgba(108,99,255,0.35);
    }
    .composer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: rgba(10,10,15,0.96);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      resize: none;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .send { background: var(--accent); color: #fff; }
    .mic { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .apply-bar {
      display: none;
      padding: 10px 16px;
      background: rgba(34,197,94,0.12);
      border-top: 1px solid rgba(34,197,94,0.3);
      font-size: 13px;
    }
    .apply-bar.visible { display: flex; flex-direction: column; gap: 8px; }
    .apply-bar button { background: #22c55e; color: #0a0a0f; }
    .status-pill {
      font-size: 11px;
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="/overlay/lifeos-app.html">← LifeOS</a>
    <div>
      <h1>Talk with Lumen</h1>
      <p>Listening, privacy &amp; capture — 100% opt-in</p>
    </div>
    <span class="status-pill" id="status-pill">Loading…</span>
  </header>
  <div class="apply-bar" id="apply-bar">
    <span>Lumen suggested settings — review before applying:</span>
    <pre id="patch-preview" style="font-size:11px;overflow:auto;max-height:80px;"></pre>
    <button type="button" id="apply-btn">Apply these preferences</button>
  </div>
  <main class="chat" id="chat" aria-live="polite"></main>
  <form class="composer" id="composer">
    <button type="button" class="mic" id="mic-btn" title="Voice">🎤</button>
    <textarea id="input" rows="1" placeholder="Tell Lumen what you want…" data-voice="true"></textarea>
    <button type="submit" class="send">Send</button>
  </form>

  <script>
  (async function () {
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const applyBar = document.getElementById('apply-bar');
    const patchPreview = document.getElementById('patch-preview');
    const statusPill = document.getElementById('status-pill');
    let CTX = null;
    let threadId = null;
    let suggestedPatch = null;

    function bubble(text, role) {
      const el = document.createElement('div');
      el.className = 'bubble ' + role;
      el.textContent = text;
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
    }

    async function api(path, body) {
      const opts = { credentials: 'same-origin', headers: { Accept: 'application/json', 'Content-Type': 'application/json' } };
      if (body) opts.method = 'POST', opts.body = JSON.stringify(body);
      if (CTX?.fetchWithAuth) return CTX.fetchWithAuth('/api/v1/lifeos/listening' + path, opts);
      if (CTX?.headers) opts.headers = CTX.headers(opts.headers);
      return fetch('/api/v1/lifeos/listening' + path, opts);
    }

    function showPatch(patch) {
      if (!patch) { applyBar.classList.remove('visible'); return; }
      suggestedPatch = patch;
      patchPreview.textContent = JSON.stringify(patch, null, 2);
      applyBar.classList.add('visible');
    }

    async function sendMessage(text) {
      const msg = String(text || '').trim();
      if (!msg) return;
      bubble(msg, 'user');
      input.value = '';
      statusPill.textContent = 'Lumen thinking…';
      const res = await api('/onboarding/message', { message: msg, thread_id: threadId });
      const data = await res.json();
      if (!data.ok) {
        bubble(data.error || 'Something went wrong.', 'lumen');
        statusPill.textContent = 'Error';
        return;
      }
      threadId = data.thread_id;
      const reply = data.reply?.content || data.reply || '';
      bubble(reply, 'lumen');
      showPatch(data.suggested_patch);
      statusPill.textContent = 'Ready';
    }

    document.getElementById('composer').addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessage(input.value);
    });

    document.getElementById('apply-btn').addEventListener('click', async () => {
      if (!suggestedPatch) return;
      statusPill.textContent = 'Applying…';
      const res = await api('/onboarding/apply', { profile: suggestedPatch, onboarding_done: true });
      const data = await res.json();
      if (data.ok) {
        bubble('Done — your preferences are saved. Use Settings or the Listening pill in LifeOS to turn listening on or off anytime.', 'lumen');
        applyBar.classList.remove('visible');
        if (window.LifeOSListeningOrchestrator) LifeOSListeningOrchestrator.fetchProfile();
      } else {
        bubble(data.error || 'Could not apply.', 'lumen');
      }
      statusPill.textContent = 'Ready';
    });

    document.getElementById('mic-btn').addEventListener('click', () => {
      if (window.LuminVoice) LuminVoice.startForInput(input, document.getElementById('mic-btn'));
    });

    CTX = await LifeOSBootstrap.init({ requireAuth: true, promptForKey: false });
    statusPill.textContent = 'Ready';

    const prof = await api('/profile');
    const pdata = await prof.json();
    if (pdata.ok && !pdata.onboarding_done) {
      bubble(
        "Hi — I'm Lumen. I'd like to help you the way *you* want to be helped.\n\n"
        + "Nothing turns on until you choose. We can talk through listening modes, what stays on your phone, win moments vs conflict clips, family guard, schedules, and therapist export.\n\n"
        + "What matters most to you right now — family tone, wake-word only, scheduled listening, or keeping everything off?",
        'lumen'
      );
    } else if (pdata.ok) {
      bubble('Welcome back. Tell me what you want to change about your listening profile — or say "turn everything off."', 'lumen');
    }
  })();
  </script>
</body>
</html>
