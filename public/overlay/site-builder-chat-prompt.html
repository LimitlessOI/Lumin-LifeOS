<!-- SYNOPSIS: LifeOS overlay UI — Site Builder Chat Prompt. -->
<div style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px;">
  <h3 style="margin: 0; font-size: 16px;">Ask the AI assistant</h3>
  <p style="margin: 5px 0; font-size: 12px; color: #666;">Type a request or tap an example below.</p>
  <div style="margin-top: 10px;">
    <span style="display: inline-block; padding: 5px 10px; margin-right: 5px; background-color: #f0f0f0; border-radius: 15px; cursor: pointer;" onclick="document.getElementById('chat-input').value = 'Change my colors';">Change my colors</span>
    <span style="display: inline-block; padding: 5px 10px; margin-right: 5px; background-color: #f0f0f0; border-radius: 15px; cursor: pointer;" onclick="document.getElementById('chat-input').value = 'Rewrite my homepage headline';">Rewrite my homepage headline</span>
    <span style="display: inline-block; padding: 5px 10px; background-color: #f0f0f0; border-radius: 15px; cursor: pointer;" onclick="document.getElementById('chat-input').value = 'Add a contact section';">Add a contact section</span>
  </div>
</div>
<input type="text" id="chat-input" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;" placeholder="Type your message here..." />
