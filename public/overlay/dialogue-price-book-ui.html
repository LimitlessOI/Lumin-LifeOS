<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Price Book UI -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Book UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .price-book {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .price-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }
        .price-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="price-book" id="priceBook">
        <!-- Price book items will be dynamically inserted here -->
    </div>

    <script>
        async function fetchPriceBook() {
            try {
                const response = await fetch('https://api.example.com/price-book');
                const data = await response.json();
                populatePriceBook(data);
            } catch (error) {
                console.error('Error fetching price book:', error);
            }
        }

        function populatePriceBook(data) {
            const priceBookContainer = document.getElementById('priceBook');
            data.forEach(item => {
                const priceItem = document.createElement('div');
                priceItem.className = 'price-item';
                priceItem.innerHTML = `<div>${item.name}</div><div>${item.price}</div>`;
                priceBookContainer.appendChild(priceItem);
            });
        }

        fetchPriceBook();
    </script>
</body>
</html>
