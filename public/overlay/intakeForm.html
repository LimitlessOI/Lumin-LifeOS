<!-- SYNOPSIS: HTML page: Intake Form -->
<!-- @ssot docs/products/productized-sprint/PRODUCT_HOME.md -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake Form</title>
    <style>
        /* Add any inline styles here if needed */
    </style>
</head>
<body>
    <h1>Intake Form</h1>
    
    <!-- Basic HTML Form -->
    <form id="basic-intake-form" action="/submit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" cols="50"></textarea><br><br>
        
        <input type="submit" value="Submit">
    </form>

    <!-- Embed Typeform using the provided script -->
    <div id="typeform-embed" style="width: 100%; height: 500px;"></div>
    <script src="https://embed.typeform.com/embed.js"></script>
    <script>
        var options = {
            url: "https://yourtypeformurl.typeform.com/to/yourformid", // Replace with your Typeform URL
            width: "100%",
            height: "500px"
        };
        window.typeformEmbed.makeWidget(document.getElementById('typeform-embed'), options);
    </script>
</body>
</html>
