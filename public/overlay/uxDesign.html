<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Teacher-OS UX Wireframes -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher-OS UX Wireframes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .wireframe {
            border: 2px dashed #333;
            padding: 10px;
            background-color: #fff;
            width: 300px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .wireframe-title {
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 14px;
            font-weight: bold;
        }
        .diagram {
            border: 2px solid #333;
            padding: 10px;
            background-color: #fff;
            width: 100%;
            margin-top: 20px;
        }
        .arrow {
            width: 0; 
            height: 0; 
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid #333;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>Teacher-OS Interface Wireframes</h1>
    <div class="container">
        <div class="wireframe">
            <div class="wireframe-title">Dashboard</div>
            <p>Overview of classes and schedules.</p>
        </div>
        <div class="wireframe">
            <div class="wireframe-title">Classroom</div>
            <p>Manage class details and student interactions.</p>
        </div>
        <div class="wireframe">
            <div class="wireframe-title">Assignments</div>
            <p>Create and review assignments.</p>
        </div>
        <div class="wireframe">
            <div class="wireframe-title">Grades</div>
            <p>View and edit student grades.</p>
        </div>
    </div>
    <h2>User Flow Diagram</h2>
    <div class="diagram">
        <p>Login</p>
        <div class="arrow"></div>
        <p>Dashboard</p>
        <div class="arrow"></div>
        <p>Classroom</p>
        <div class="arrow"></div>
        <p>Assignments</p>
        <div class="arrow"></div>
        <p>Grades</p>
    </div>
</body>
</html>
