<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: LifeOS Food Logger -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Logger — LifeOS</title>
  <script src="/overlay/lifeos-theme.js"></script>
  <script src="/overlay/lifeos-bootstrap.js"></script>
  <link rel="stylesheet" href="/overlay/lifeos-ds.css">
  <style>
    body { font-family: Georgia, 'Times New Roman', serif; background: #0c1110; color: #e6efe9; margin: 0; min-height: 100vh; }
    .root { max-width: 720px; margin: 0 auto; padding: 28px 18px 80px; }
    h1 { font-size: 1.7rem; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 6px; }
    .sub { color: #8aa396; font-size: 0.95rem; margin-bottom: 22px; }
    .panel { background: linear-gradient(160deg, #14201b, #101614 70%); border: 1px solid #24352e; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    label { display: block; font-size: 0.8rem; color: #9bb5a8; margin-bottom: 6px; }
    textarea, input { width: 100%; box-sizing: border-box; background: #0b1210; color: #e6efe9; border: 1px solid #2c4037; border-radius: 8px; padding: 10px; font: inherit; }
    button { margin-top: 12px; background: #2f6b52; color: #f2fff8; border: 0; border-radius: 8px; padding: 10px 16px; font: inherit; cursor: pointer; }
    button:hover { background: #388260; }
    .meta { font-size: 0.85rem; color: #8aa396; margin-top: 10px; }
    .log { border-top: 1px solid #24352e; padding: 10px 0; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="root">
    <h1>Food Logger</h1>
    <p class="sub">Photo or text → rough nutrition estimate into your LifeOS log.</p>
    <div class="panel">
      <label for="desc">What did you eat?</label>
      <textarea id="desc" rows="3" placeholder="e.g. grilled salmon, rice, broccoli"></textarea>
      <label for="img" style="margin-top:12px">Optional image URL</label>
      <input id="img" type="url" placeholder="https://…">
      <button id="save">Log meal</button>
      <div class="meta" id="status">Ready.</div>
    </div>
    <div class="panel">
      <strong>Recent</strong>
      <div id="logs" class="meta">Loading…</div>
    </div>
  </div>
  <script>
  const CTX = window.LifeOSBootstrap.getLifeOSContext({ defaultUser: 'adam' });
  const api = (url, opts) => (CTX.fetchWithAuth ? CTX.fetchWithAuth(url, opts) : fetch(url, { ...opts, headers: { ...(opts && opts.headers), ...CTX.headers() } }));

  async function refresh() {
    const el = document.getElementById('logs');
    try {
      const r = await api('/api/v1/lifeos/food/logs?limit=12&user=' + encodeURIComponent(CTX.USER || 'adam'));
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const j = await r.json();
      const rows = j.logs || [];
      el.innerHTML = rows.length
        ? rows.map((x) => '<div class="log">' + (x.description || 'meal') + ' · ' + (x.calories ?? '?') + ' kcal · ' + (x.confidence || '') + '</div>').join('')
        : 'No meals logged yet.';
    } catch (e) {
      el.textContent = 'Could not load logs (' + e.message + '). Sign in if needed.';
    }
  }
  document.getElementById('save').onclick = async () => {
    const status = document.getElementById('status');
    status.textContent = 'Saving…';
    try {
      const body = {
        user: CTX.USER || 'adam',
        description: document.getElementById('desc').value.trim() || null,
        imageUrl: document.getElementById('img').value.trim() || null,
      };
      const r = await api('/api/v1/lifeos/food/log', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      status.textContent = 'Logged.';
      document.getElementById('desc').value = '';
      await refresh();
    } catch (e) {
      status.textContent = 'Save failed: ' + e.message;
    }
  };
  refresh();
  </script>
</body>
</html>
