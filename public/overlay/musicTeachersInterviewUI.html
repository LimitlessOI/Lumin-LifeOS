<!-- SYNOPSIS: HTML page: Music Teachers Interview -->
<!-- @ssot docs/products/music-talent-studio/PRODUCT_HOME.md -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Teachers Interview</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .teacher-form {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .teacher-form h2 {
            margin-top: 0;
        }
        .question {
            margin-bottom: 10px;
        }
        .question label {
            display: block;
            margin-bottom: 5px;
        }
        .question input, .question textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .submit-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Interview Music Teachers</h1>

    <form class="teacher-form" id="teacher1">
        <h2>Teacher 1</h2>
        <div class="question">
            <label for="name1">Name:</label>
            <input type="text" id="name1" name="name1" required>
        </div>
        <div class="question">
            <label for="experience1">Years of Experience:</label>
            <input type="number" id="experience1" name="experience1" required>
        </div>
        <div class="question">
            <label for="specialization1">Specialization:</label>
            <input type="text" id="specialization1" name="specialization1" required>
        </div>
        <div class="question">
            <label for="philosophy1">Teaching Philosophy:</label>
            <textarea id="philosophy1" name="philosophy1" rows="4" required></textarea>
        </div>
        <button type="submit" class="submit-btn">Submit</button>
    </form>

    <!-- Repeat the form structure for Teacher 2 to Teacher 5 -->

</body>
</html>
