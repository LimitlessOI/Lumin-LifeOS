<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Ask your life — LifeOS Mirror query -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask your life — LifeOS</title>
  <script src="/overlay/lifeos-theme.js"></script>
  <script src="/overlay/lifeos-bootstrap.js"></script>
  <style>
    body { margin: 0; font-family: 'Avenir Next', 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #1a2430, #0b1016 55%); color: #e8eef5; min-height: 100vh; }
    .root { max-width: 720px; margin: 0 auto; padding: 28px 18px 80px; }
    h1 { font-size: 1.7rem; margin: 0 0 6px; letter-spacing: -0.02em; }
    .sub { color: #8ea0b5; margin-bottom: 18px; }
    form { display: flex; gap: 8px; }
    input { flex: 1; border-radius: 10px; border: 1px solid #2c3b4d; background: #121820; color: #e8eef5; padding: 12px; font: inherit; }
    button { border: 0; border-radius: 10px; background: #3d6ea8; color: #fff; padding: 12px 16px; font: inherit; cursor: pointer; }
    .moment { margin-top: 12px; padding: 12px; border: 1px solid #243142; border-radius: 10px; background: rgba(18,24,32,0.9); }
    .kind { font-size: 0.75rem; color: #8ea0b5; text-transform: uppercase; letter-spacing: 0.06em; }
  </style>
</head>
<body>
  <div class="root">
    <h1>Ask your life</h1>
    <p class="sub">Search real moments from sleep, feelings, decisions, and commitments — not synthetic answers.</p>
    <form id="qform">
      <input id="q" placeholder='e.g. when was I last this tired?' autocomplete="off" />
      <button type="submit">Ask</button>
    </form>
    <div id="out" class="sub" style="margin-top:16px">Ask a question to begin.</div>
  </div>
  <script>
    document.getElementById('qform').onsubmit = async (e) => {
      e.preventDefault();
      const out = document.getElementById('out');
      const q = document.getElementById('q').value.trim();
      out.textContent = 'Searching…';
      try {
        const r = await fetch('/api/v1/lifeos/ask-your-life?q=' + encodeURIComponent(q), { credentials: 'include' });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
        const moments = j.moments || [];
        out.innerHTML = '<p>' + (j.message || '') + '</p>' + (moments.length
          ? moments.map((m) => '<div class="moment"><div class="kind">' + (m.kind || '') + ' · ' + (m.when || '') + '</div><div>' + (m.summary || '') + '</div><div style="color:#8ea0b5">' + (m.detail || '') + '</div></div>').join('')
          : '<p>No matching moments yet.</p>');
      } catch (err) {
        out.textContent = 'Could not search: ' + err.message;
      }
    };
  </script>
</body>
</html>
