<!-- SYNOPSIS: LifeOS overlay UI — Site Builder Editor Onboarding Prompt. -->
<div id="onboarding-prompt" style="position: fixed; top: 0; left: 0; width: 100%; background-color: #f7f7f9; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 1000;">
  <span style="font-size: 16px; color: #333;">Start here: choose a template, then edit your text.</span>
  <div>
    <button onclick="openTemplatePicker()" style="margin-right: 10px; padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">Pick a template</button>
    <button onclick="dismissOnboardingPrompt()" style="padding: 10px 20px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">I'll explore on my own</button>
  </div>
</div>
<script>
  function openTemplatePicker() {
    // Logic to open the template picker overlay
  }
  function dismissOnboardingPrompt() {
    document.getElementById('onboarding-prompt').style.display = 'none';
    localStorage.setItem('sb_onboarding_dismissed', '1');
  }
  (function checkOnboardingDismissed() {
    if (localStorage.getItem('sb_onboarding_dismissed') === '1') {
      document.getElementById('onboarding-prompt').style.display = 'none';
    }
  })();
</script>
