<!-- SYNOPSIS: LifeOS overlay UI — Site Builder Template Picker. -->
<div id="template-picker-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background-color:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:1000;">
  <div style="background:white; padding:20px; border-radius:8px; width:80%; max-width:800px;">
    <h2>Choose a starting design</h2>
    <p>Pick the look that fits your business — you can change everything later.</p>
    <div id="template-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px; margin-top:20px;"></div>
    <button onclick="closeOverlay()" style="margin-top:20px;">Close</button>
  </div>
  <script>
    function fetchTemplates() {
      fetch('/api/site-builder/templates')
        .then(response => response.json())
        .then(data => renderTemplates(data))
        .catch(error => console.error('Error fetching templates:', error));
    }

    function renderTemplates(templates) {
      const grid = document.getElementById('template-grid');
      templates.forEach(template => {
        const card = document.createElement('div');
        card.style.border = '1px solid #ccc';
        card.style.borderRadius = '8px';
        card.style.padding = '10px';
        card.style.textAlign = 'center';
        card.innerHTML = `
          <img src="${template.thumbnail}" alt="${template.name}" style="width:100%; height:auto; border-radius:4px;">
          <h3>${template.name}</h3>
          <button onclick="useTemplate('${template.id}')">Use this template</button>
        `;
        grid.appendChild(card);
      });
    }

    function useTemplate(templateId) {
      // Post the chosen template id back to the editor state
      // This is a placeholder for actual implementation
      console.log('Template chosen:', templateId);
      closeOverlay();
    }

    function closeOverlay() {
      document.getElementById('template-picker-overlay').style.display = 'none';
    }

    // Initialize the template picker
    fetchTemplates();
  </script>
</div>
