<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeOS Founder Interface</title>
  <style>
    :root {
      --bg: #0b1220;
      --surface: #121a2b;
      --line: #26324a;
      --text: #e7ecf7;
      --muted: #9aa7bf;
      --accent: #66b3ff;
      --pass: #39d98a;
      --fail: #ff6b6b;
      --warn: #ffd166;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    header { padding: 14px 18px; border-bottom: 1px solid var(--line); background: var(--surface); }
    h1 { margin: 0; font-size: 16px; }
    .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
    main { max-width: 1040px; margin: 0 auto; padding: 16px; display: grid; gap: 14px; }
    .panel { border: 1px solid var(--line); border-radius: 10px; background: var(--surface); padding: 12px; }
    .grid { display: grid; gap: 8px; grid-template-columns: repeat(4, minmax(140px, 1fr)); }
    label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
    select, input, textarea, button { font: inherit; }
    select, input, textarea {
      width: 100%; background: #0a1020; color: var(--text); border: 1px solid var(--line); border-radius: 8px; padding: 8px;
    }
    textarea { min-height: 130px; resize: vertical; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    button { border: 1px solid var(--line); background: #0a1020; color: var(--text); border-radius: 8px; padding: 8px 12px; cursor: pointer; }
    .primary { background: var(--accent); color: #001224; border-color: var(--accent); font-weight: 700; }
    .recording { border-color: var(--warn); color: var(--warn); }
    .kpis { display: grid; gap: 8px; grid-template-columns: repeat(5, minmax(120px, 1fr)); }
    .kpi { border: 1px solid var(--line); border-radius: 8px; padding: 8px; background: #0a1020; }
    .kpi .k { color: var(--muted); font-size: 10px; text-transform: uppercase; }
    .kpi .v { font-size: 13px; margin-top: 3px; }
    .pass { color: var(--pass); }
    .fail { color: var(--fail); }
    .list { font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; white-space: pre-wrap; background: #0a1020; border: 1px solid var(--line); border-radius: 8px; padding: 8px; max-height: 280px; overflow: auto; }
    .hidden { display: none; }
    @media (max-width: 900px) { .grid, .kpis { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>LifeOS Founder Interface</h1>
    <div class="sub">Conversational wrapper over terminal truth: if no command ran, nothing happened.</div>
  </header>
  <main>
    <section class="panel">
      <div class="grid">
        <div>
          <label>Action</label>
          <select id="action">
            <option value="auto">Auto</option>
            <option value="execute">Execute BuilderOS</option>
            <option value="display">Display data only</option>
          </select>
        </div>
        <div>
          <label>Stage</label>
          <select id="stage">
            <option value="development">development</option>
            <option value="system">system</option>
          </select>
        </div>
        <div>
          <label>Source Mode</label>
          <select id="sourceMode">
            <option value="text">text</option>
            <option value="microphone">microphone</option>
          </select>
        </div>
        <div>
          <label>Mission ID (optional)</label>
          <input id="missionId" placeholder="BUILDEROS-...">
        </div>
      </div>
      <div style="margin-top:8px">
        <label>Founder Input</label>
        <textarea id="input" placeholder="Type normally. Example: Build full twin first, then derive V1 cuts before ARC."></textarea>
      </div>
      <div class="actions">
        <button id="recordBtn">Start Dictation</button>
        <button id="sendBtn" class="primary">Send to BuilderOS</button>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">
          <input id="dictateThenSend" type="checkbox"> dictate-then-send
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">
          <input id="conversationalMode" type="checkbox" checked> conversational mode
        </label>
      </div>
    </section>

    <section class="panel">
      <div class="kpis">
        <div class="kpi"><div class="k">Pass/Fail</div><div id="kPassFail" class="v">—</div></div>
        <div class="kpi"><div class="k">Command Truth</div><div id="kCommandTruth" class="v">—</div></div>
        <div class="kpi"><div class="k">Exit Code</div><div id="kExit" class="v">—</div></div>
        <div class="kpi"><div class="k">Mission ID</div><div id="kMission" class="v">—</div></div>
        <div class="kpi"><div class="k">First Blocker</div><div id="kBlocker" class="v">—</div></div>
      </div>
      <div style="margin-top:10px" class="list" id="summary">No run yet.</div>
    </section>

    <section class="panel">
      <label>Command Executed</label>
      <div id="commandExecuted" class="mono">—</div>
      <label style="margin-top:8px">Receipt Paths</label>
      <div id="receiptPaths" class="list">—</div>
      <label style="margin-top:8px">Artifact Paths</label>
      <div id="artifactPaths" class="list">—</div>
    </section>

    <section class="panel">
      <label>Raw Stdout</label>
      <div id="stdout" class="mono">—</div>
      <label style="margin-top:8px">Raw Stderr</label>
      <div id="stderr" class="mono">—</div>
    </section>
  </main>
  <script src="/overlay/lifeos-founder-interface.js"></script>
</body>
</html>
