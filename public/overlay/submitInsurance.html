<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Insurance Submission -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Submission</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .charge-slip {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .charge-slip h2 {
            margin-top: 0;
        }
        .actions {
            text-align: center;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: #fff;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Submit Insurance</h1>
        <div class="charge-slip">
            <h2>Charge Slip #1</h2>
            <p>Details of charge slip...</p>
        </div>
        <div class="charge-slip">
            <h2>Charge Slip #2</h2>
            <p>Details of charge slip...</p>
        </div>
        <div class="actions">
            <button type="button">Submit</button>
        </div>
    </div>
</body>
</html>
