<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Household Mission Board -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Household Mission Board</title>
  <style>
    / BPB-0001 §Section 6 — prescribed UI, builder-discretion layout /
    :root {
      --bg: #0a0b0e;
      --panel: #12141a;
      --border: #1e2230;
      --text: #d4d8e8;
      --muted: #5a6080;
      --accent: #4f8ef7;
      --green: #3ddc84;
      --yellow: #f7c948;
      --red: #f7564f;
      --orange: #f7934f;
      --purple: #9b6ef7;
      --blue: #4f8ef7;
      --gray: #5a6080;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      min-height: 100vh;
      padding: 16px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    header h1 { font-size: 16px; color: var(--text); }
    #status-line { font-size: 11px; color: var(--muted); margin-left: auto; }
    .state-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
    }
    .pill-gray   { background: #2a2d38; color: var(--gray); }
    .pill-yellow { background: #2d2a10; color: var(--yellow); }
    .pill-blue   { background: #101c38; color: var(--blue); }
    .pill-orange { background: #2d1c0a; color: var(--orange); }
    .pill-purple { background: #1e1030; color: var(--purple); }
    .pill-green  { background: #0d2a1a; color: var(--green); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
    }
    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .section h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .section.overdue { border-color: var(--red); }
    .section.overdue h2 { color: var(--red); }
    .commitment-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .commitment-row:last-child { border-bottom: none; }
    .commitment-text { flex: 1; line-height: 1.4; }
    .commitment-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .badge-owner {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      white-space: nowrap;
    }
    .badge-adam   { background: #101c38; color: var(--blue); }
    .badge-sherry { background: #2d1c0a; color: var(--orange); }
    .empty { color: var(--muted); font-size: 12px; font-style: italic; padding: 8px 0; }
    button.approve-btn {
      background: #0d2a1a;
      color: var(--green);
      border: 1px solid var(--green);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    button.approve-btn:hover { background: #153d28; }
    / Add commitment form /
    #add-section { grid-column: 1 / -1; }
    #add-form { display: flex; flex-direction: column; gap: 10px; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-row label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--muted); }
    .form-row input, .form-row select, .form-row textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
    }
    .form-row textarea { resize: vertical; min-height: 60px; flex: 1; }
    button.submit-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      align-self: flex-start;
    }
    button.submit-btn:hover { opacity: 0.85; }
    #form-feedback { font-size: 12px; color: var(--green); min-height: 18px; }
  </style>
</head>
<body>
<header>
  <h1>builderos // household</h1>
  <span id="mission-badge"></span>
  <span id="status-line">loading…</span>
</header>
<div class="grid" id="board-grid">
  <div class="section">
    <h2>Active Missions List</h2>
    <div id="active-missions"></div>
  </div>
  <div class="section">
    <h2>Mission Detail</h2>
    <div id="mission-detail"></div>
  </div>
  <div class="section">
    <h2>Participants</h2>
    <div id="participants"></div>
  </div>
  <div class="section">
    <h2>Board Items</h2>
    <div id="board-items"></div>
  </div>
  <div class="section">
    <h2>Commitments</h2>
    <div id="commitments"></div>
  </div>
  <div class="section">
    <h2>Add Mission</h2>
    <form id="add-mission-form" onsubmit="addMission(event)">
      <div class="form-row">
        <label>Mission Title
          <input type="text" name="title" required>
        </label>
        <label>Description
          <textarea name="description" required></textarea>
        </label>
      </div>
      <button type="submit" class="submit-btn">Add Mission</button>
    </form>
    <div id="add-mission-feedback"></div>
  </div>
  <div class="section">
    <h2>Add Board Item</h2>
    <form id="add-board-item-form" onsubmit="addBoardItem(event)">
      <div class="form-row">
        <label>Item Title
          <input type="text" name="title" required>
        </label>
        <label>Description
          <textarea name="description" required></textarea>
        </label>
      </div>
      <button type="submit" class="submit-btn">Add Board Item</button>
    </form>
    <div id="add-board-item-feedback"></div>
  </div>
  <div class="section">
    <h2>Transition/Approve Panel</h2>
    <button class="approve-btn" onclick="approveMission()">Approve</button>
    <div id="approve-feedback"></div>
  </div>
</div>
<script>
const API_KEY = new URLSearchParams(location.search).get('key');
if (!API_KEY) {
  document.body.innerHTML = '<p style="color: var(--red);">Access Denied: Missing API Key</p>';
} else {
  async function fetchData(url) {
    const response = await fetch(url, {
      headers: { 'X-Auth-Key': API_KEY }
    });
    return response.json();
  }
  async function loadActiveMissions() {
    const data = await fetchData('/api/missions');
    document.getElementById('active-missions').innerHTML = data.map(m => `<div>${m.title}</div>`).join('');
  }
  async function approveMission() {
    const missionId = 'dummy-mission-id'; // Replace with actual mission ID
    const response = await fetch(`/api/missions/${missionId}/transition`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Auth-Key': API_KEY
      },
      body: JSON.stringify({ nextState: 'active' })
    });
    const result = await response.json();
    document.getElementById('approve-feedback').textContent = result.ok ? 'Approved!' : 'Failed to approve';
  }
  async function addMission(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    const response = await fetch('/api/missions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Auth-Key': API_KEY
      },
      body: JSON.stringify({
        title: formData.get('title'),
        description: formData.get('description')
      })
    });
    const result = await response.json();
    document.getElementById('add-mission-feedback').textContent = result.ok ? 'Mission Added!' : 'Failed to add mission';
  }
  async function addBoardItem(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    const response = await fetch('/api/board-items', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Auth-Key': API_KEY
      },
      body: JSON.stringify({
        title: formData.get('title'),
        description: formData.get('description')
      })
    });
    const result = await response.json();
    document.getElementById('add-board-item-feedback').textContent = result.ok ? 'Board Item Added!' : 'Failed to add board item';
  }
  loadActiveMissions();
  setInterval(loadActiveMissions, 30000);
}
</script>
</body>
</html>
