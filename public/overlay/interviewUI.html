<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Interview Results -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgba(0, 0, 0, 0.5);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .overlay {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 600px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .results {
            margin-bottom: 20px;
        }
        .summary {
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
        .summary p {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="header">
            <h2>Interview Results</h2>
        </div>
        <div class="results">
            <h3>Results:</h3>
            <ul>
                <li>Candidate A: Pass</li>
                <li>Candidate B: Fail</li>
                <li>Candidate C: Pass</li>
            </ul>
        </div>
        <div class="summary">
            <h3>Summary:</h3>
            <p>Total Candidates: 3</p>
            <p>Pass: 2</p>
            <p>Fail: 1</p>
        </div>
    </div>
</body>
</html>
