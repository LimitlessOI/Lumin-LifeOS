<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Audit Intake Form -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Intake Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .form-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .form-group textarea {
            resize: vertical;
            height: 100px;
        }
        .form-group button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 3px;
        }
        .form-group button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Audit Intake Form</h1>
        <form id="auditIntakeForm">
            <div class="form-group">
                <label for="auditorName">Auditor's Name:</label>
                <input type="text" id="auditorName" name="auditorName" required>
            </div>
            <div class="form-group">
                <label for="auditDate">Date of Audit:</label>
                <input type="date" id="auditDate" name="auditDate" required>
            </div>
            <div class="form-group">
                <label for="auditQuestions">Audit Questions:</label>
                <textarea id="auditQuestions" name="auditQuestions" placeholder="Enter your questions here..." required></textarea>
            </div>
            <div class="form-group">
                <label for="systemConnection">System Connections (optional):</label>
                <select id="systemConnection" name="systemConnection">
                    <option value="">Select a system</option>
                    <option value="systemA">System A</option>
                    <option value="systemB">System B</option>
                    <option value="systemC">System C</option>
                </select>
            </div>
            <div class="form-group">
                <button type="submit">Submit</button>
            </div>
        </form>
    </div>
    <script>
        document.getElementById('auditIntakeForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Form submitted successfully!');
        });
    </script>
</body>
</html>
