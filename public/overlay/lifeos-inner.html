<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/overlay/lifeos-ds.css">
  <title>Inner Work — LifeOS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e8e8f0; min-height: 100vh; }
    .root { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #555; margin-bottom: 32px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 1px solid #1e1e2e; }
    .tab { padding: 10px 18px; font-size: 13px; color: #555; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab.active { color: #a0aaff; border-bottom-color: #5b6af5; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card { background: #111118; border: 1px solid #1e1e2e; border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
    .card-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid #191920; }
    .card-header .title { font-size: 14px; color: #d8d8e8; }
    .card-header .meta  { font-size: 11px; color: #555; }
    .card-body { padding: 14px 18px; font-size: 13px; color: #888; line-height: 1.6; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
    .badge.high     { background: #2a0a0a; color: #e05555; }
    .badge.medium   { background: #1a1830; color: #7c85ff; }
    .badge.low      { background: #0a2018; color: #34d399; }
    .badge.calm     { background: #0a2018; color: #34d399; }
    .badge.supportive { background: #0a2018; color: #34d399; }
    .badge.firm     { background: #1a1830; color: #7c85ff; }
    .badge.reactive { background: #2a0a0a; color: #e05555; }
    .badge.default  { background: #1a1a20; color: #888; }
    .actions { display: flex; gap: 8px; align-items: center; }
    .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #2a2a3a; background: transparent; color: #666; font-size: 11px; cursor: pointer; }
    .btn:hover { background: #1a1a2a; color: #aaa; }
    .btn.primary { border-color: #5b6af5; color: #a0aaff; }
    .btn.primary:hover { background: #1e2060; }
    .empty { padding: 40px; text-align: center; color: #444; font-size: 14px; }
    .form-block { background: #111118; border: 1px solid #1e1e2e; border-radius: 10px; padding: 24px; margin-bottom: 24px; }
    .form-block-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-field label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #555; display: block; margin-bottom: 6px; }
    .form-field input, .form-field select, .form-field textarea {
      width: 100%; background: #0d0d1a; border: 1px solid #2a2a3a;
      border-radius: 8px; color: #e8e8f0; padding: 9px 12px; font-size: 13px; outline: none;
      font-family: inherit;
    }
    .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: #5b6af5; }
    .form-field.full { grid-column: 1/-1; }
    .btn-submit { padding: 10px 24px; background: #1e2060; border: 1px solid #5b6af5; border-radius: 8px; color: #a0aaff; font-size: 13px; cursor: pointer; }
    .btn-submit:hover { background: #262880; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-header h2 { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-row input[type=range] { flex: 1; accent-color: #5b6af5; }
    .slider-val { width: 28px; text-align: right; font-size: 13px; color: #a0aaff; font-weight: 600; }
    .mood-pair { display: flex; gap: 20px; margin-top: 6px; }
    .mood-block .mood-val  { font-size: 22px; font-weight: 700; color: #a0aaff; }
    .mood-block .mood-label { font-size: 10px; color: #555; text-transform: uppercase; margin-top: 2px; }
    .mood-arrow { align-self: flex-end; color: #555; padding-bottom: 4px; }
    .spinner { width:16px; height:16px; border:2px solid #2a2a3a; border-top-color:#5b6af5; border-radius:50%; animation:spin .8s linear infinite; display:inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position:fixed; bottom:24px; right:24px; background:#1e2060; border:1px solid #5b6af5; border-radius:8px; padding:12px 18px; font-size:13px; color:#a0aaff; opacity:0; transform:translateY(10px); transition:all .25s; z-index:1000; }
    .toast.show { opacity:1; transform:translateY(0); }
  </style>
</head>
<body>
<div class="root">
  <h1>Inner Work</h1>
  <p class="sub">Patterns. Sessions. Effectiveness.</p>
  <div class="tabs">
    <div class="tab active" onclick="showTab('patterns')">Emotional Patterns</div>
    <div class="tab" onclick="showTab('parenting')">Parenting Log</div>
    <div class="tab" onclick="showTab('sessions')">Inner Work Sessions</div>
  </div>

  <!-- Emotional Patterns -->
  <div class="panel active" id="panel-patterns">
    <div class="section-header">
      <h2>Detected Patterns</h2>
      <button class="btn primary" onclick="runAnalysis()">Run Analysis</button>
    </div>
    <div id="patterns-list"><div class="empty"><span class="spinner"></span></div></div>
  </div>

  <!-- Parenting Log -->
  <div class="panel" id="panel-parenting">
    <div class="form-block">
      <div class="form-block-title">Log a Moment</div>
      <div class="form-row">
        <div class="form-field">
          <label>Child's Name</label>
          <input id="p-child" placeholder="e.g. Emma" />
        </div>
        <div class="form-field">
          <label>Tone Used</label>
          <select id="p-tone">
            <option value="calm">Calm</option>
            <option value="firm">Firm</option>
            <option value="supportive">Supportive</option>
            <option value="reactive">Reactive</option>
          </select>
        </div>
        <div class="form-field full">
          <label>Situation</label>
          <input id="p-situation" placeholder="What was happening..." />
        </div>
        <div class="form-field full">
          <label>Outcome</label>
          <input id="p-outcome" placeholder="How it resolved..." />
        </div>
        <div class="form-field full">
          <label>Notes</label>
          <textarea id="p-notes" rows="3" placeholder="Anything else worth capturing..."></textarea>
        </div>
      </div>
      <button class="btn-submit" onclick="logMoment()">Log Moment</button>
    </div>
    <div id="parenting-list"><div class="empty"><span class="spinner"></span></div></div>
  </div>

  <!-- Inner Work Sessions -->
  <div class="panel" id="panel-sessions">
    <div class="form-block">
      <div class="form-block-title">Log a Session</div>
      <div class="form-row">
        <div class="form-field">
          <label>Type</label>
          <select id="s-type">
            <option value="meditation">Meditation</option>
            <option value="journaling">Journaling</option>
            <option value="therapy">Therapy</option>
            <option value="breathwork">Breathwork</option>
            <option value="reflection">Reflection</option>
          </select>
        </div>
        <div class="form-field">
          <label>Duration (minutes)</label>
          <input id="s-duration" type="number" min="1" placeholder="20" />
        </div>
        <div class="form-field full">
          <label>Insight</label>
          <textarea id="s-insight" rows="3" placeholder="What came up or clicked..."></textarea>
        </div>
        <div class="form-field full">
          <label>Mood Before (1–10)</label>
          <div class="slider-row">
            <input id="s-mood-before" type="range" min="1" max="10" value="5"
                   oninput="document.getElementById('s-mb-val').textContent=this.value" />
            <span class="slider-val" id="s-mb-val">5</span>
          </div>
        </div>
        <div class="form-field full">
          <label>Mood After (1–10)</label>
          <div class="slider-row">
            <input id="s-mood-after" type="range" min="1" max="10" value="7"
                   oninput="document.getElementById('s-ma-val').textContent=this.value" />
            <span class="slider-val" id="s-ma-val">7</span>
          </div>
        </div>
      </div>
      <button class="btn-submit" onclick="logSession()">Log Session</button>
    </div>
    <div id="sessions-list"><div class="empty"><span class="spinner"></span></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  const API  = '';
  const KEY  = localStorage.getItem('commandKey') || '';
  const H    = { 'Content-Type': 'application/json', 'x-command-key': KEY };
  const USER = new URLSearchParams(location.search).get('user')
            || localStorage.getItem('lifeos_user')
            || localStorage.getItem('lifeosUser')
            || 'adam';
  if (USER) localStorage.setItem('lifeos_user', USER);

  const TABS = ['patterns', 'parenting', 'sessions'];

  function showTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', TABS[i] === name));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${name}`).classList.add('active');
    if (name === 'patterns')  loadPatterns();
    if (name === 'parenting') loadParenting();
    if (name === 'sessions')  loadSessions();
  }

  // ── Patterns ────────────────────────────────────────────────────────────────

  async function loadPatterns() {
    const el = document.getElementById('patterns-list');
    el.innerHTML = '<div class="empty"><span class="spinner"></span></div>';
    try {
      const res  = await fetch(`${API}/api/v1/lifeos/emotional/patterns?user=${USER}`, { headers: H });
      const data = await res.json();
      if (!data.ok || !data.patterns || !data.patterns.length) {
        el.innerHTML = '<div class="empty">No patterns detected yet. Run an analysis to get started.</div>';
        return;
      }
      el.innerHTML = data.patterns.map(p => `
        <div class="card">
          <div class="card-header">
            <span class="title">${esc(p.pattern_name || p.name || 'Pattern')}</span>
            <div class="actions">
              <span class="badge ${freqBadge(p.frequency)}">${esc(p.frequency || 'unknown')}</span>
              <span class="meta">${p.last_seen ? new Date(p.last_seen).toLocaleDateString() : ''}</span>
            </div>
          </div>
          ${p.trigger ? `<div class="card-body"><strong>Trigger:</strong> ${esc(p.trigger)}</div>` : ''}
        </div>`).join('');
    } catch (e) {
      el.innerHTML = '<div class="empty">Failed to load patterns.</div>';
    }
  }

  function freqBadge(f) {
    const v = (f || '').toLowerCase();
    if (v === 'high' || v === 'frequent') return 'high';
    if (v === 'medium' || v === 'moderate' || v === 'occasional') return 'medium';
    if (v === 'low' || v === 'rare') return 'low';
    return 'default';
  }

  async function runAnalysis() {
    toast('Running analysis…');
    try {
      const res  = await fetch(`${API}/api/v1/lifeos/emotional/patterns/analyze?user=${USER}`, { method: 'POST', headers: H });
      const data = await res.json();
      if (data.ok) { toast('Analysis complete'); loadPatterns(); }
      else toast(`Error: ${data.error || 'unknown'}`);
    } catch (e) {
      toast('Request failed');
    }
  }

  // ── Parenting Log ───────────────────────────────────────────────────────────

  async function loadParenting() {
    const el = document.getElementById('parenting-list');
    el.innerHTML = '<div class="empty"><span class="spinner"></span></div>';
    try {
      const res  = await fetch(`${API}/api/v1/lifeos/emotional/parenting?user=${USER}`, { headers: H });
      const data = await res.json();
      if (!data.ok || !data.moments || !data.moments.length) {
        el.innerHTML = '<div class="empty">No moments logged yet.</div>';
        return;
      }
      el.innerHTML = data.moments.map(m => `
        <div class="card">
          <div class="card-header">
            <span class="title">${esc(m.child_name || 'Child')}</span>
            <div class="actions">
              <span class="badge ${esc(m.tone_used || 'default')}">${esc(m.tone_used || '—')}</span>
              <span class="meta">${m.created_at ? new Date(m.created_at).toLocaleDateString() : ''}</span>
            </div>
          </div>
          <div class="card-body">
            <strong>Situation:</strong> ${esc(m.situation || m.moment || '')}
            ${m.outcome ? `<br><strong>Outcome:</strong> ${esc(m.outcome)}` : ''}
            ${m.notes   ? `<br><em>${esc(m.notes)}</em>` : ''}
          </div>
        </div>`).join('');
    } catch (e) {
      el.innerHTML = '<div class="empty">Failed to load parenting log.</div>';
    }
  }

  async function logMoment() {
    const body = {
      user:       USER,
      child_name: document.getElementById('p-child').value.trim(),
      situation:  document.getElementById('p-situation').value.trim(),
      tone_used:  document.getElementById('p-tone').value,
      outcome:    document.getElementById('p-outcome').value.trim(),
      notes:      document.getElementById('p-notes').value.trim(),
    };
    if (!body.child_name) { toast('Child name is required'); return; }
    if (!body.situation)  { toast('Situation is required'); return; }
    try {
      const res  = await fetch(`${API}/api/v1/lifeos/emotional/parenting`, { method: 'POST', headers: H, body: JSON.stringify(body) });
      const data = await res.json();
      if (data.ok) {
        toast('Moment logged');
        ['p-child', 'p-situation', 'p-outcome', 'p-notes'].forEach(id => document.getElementById(id).value = '');
        loadParenting();
      } else toast(`Error: ${data.error || 'unknown'}`);
    } catch (e) {
      toast('Request failed');
    }
  }

  // ── Inner Work Sessions ─────────────────────────────────────────────────────

  async function loadSessions() {
    const el = document.getElementById('sessions-list');
    el.innerHTML = '<div class="empty"><span class="spinner"></span></div>';
    try {
      const res  = await fetch(`${API}/api/v1/lifeos/emotional/inner-work?user=${USER}`, { headers: H });
      const data = await res.json();
      if (!data.ok || !data.sessions || !data.sessions.length) {
        el.innerHTML = '<div class="empty">No sessions logged yet.</div>';
        return;
      }
      el.innerHTML = data.sessions.map(s => `
        <div class="card">
          <div class="card-header">
            <span class="title">${esc(s.type)}</span>
            <div class="actions">
              ${s.duration_min ? `<span class="meta">${s.duration_min} min</span>` : ''}
              <span class="meta">${s.created_at ? new Date(s.created_at).toLocaleDateString() : ''}</span>
            </div>
          </div>
          <div class="card-body">
            ${s.insight ? `<em>${esc(s.insight)}</em>` : ''}
            ${s.mood_before != null && s.mood_after != null ? `
              <div class="mood-pair" style="margin-top:${s.insight ? '10px' : '0'}">
                <div class="mood-block">
                  <div class="mood-val">${s.mood_before}</div>
                  <div class="mood-label">Before</div>
                </div>
                <div class="mood-arrow">→</div>
                <div class="mood-block">
                  <div class="mood-val">${s.mood_after}</div>
                  <div class="mood-label">After</div>
                </div>
              </div>` : ''}
          </div>
        </div>`).join('');
    } catch (e) {
      el.innerHTML = '<div class="empty">Failed to load sessions.</div>';
    }
  }

  async function logSession() {
    const body = {
      user:        USER,
      type:        document.getElementById('s-type').value,
      duration_min:parseInt(document.getElementById('s-duration').value, 10) || null,
      insight:     document.getElementById('s-insight').value.trim(),
      mood_before: parseInt(document.getElementById('s-mood-before').value, 10),
      mood_after:  parseInt(document.getElementById('s-mood-after').value, 10),
    };
    try {
      const res  = await fetch(`${API}/api/v1/lifeos/emotional/inner-work`, { method: 'POST', headers: H, body: JSON.stringify(body) });
      const data = await res.json();
      if (data.ok) {
        toast('Session logged');
        document.getElementById('s-insight').value  = '';
        document.getElementById('s-duration').value = '';
        document.getElementById('s-mood-before').value = 5;
        document.getElementById('s-mood-after').value  = 7;
        document.getElementById('s-mb-val').textContent = '5';
        document.getElementById('s-ma-val').textContent = '7';
        loadSessions();
      } else toast(`Error: ${data.error || 'unknown'}`);
    } catch (e) {
      toast('Request failed');
    }
  }

  function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function toast(msg) { const e = document.getElementById('toast'); e.textContent = msg; e.classList.add('show'); setTimeout(() => e.classList.remove('show'), 2500); }

  if (!KEY) { const k = prompt('Enter your command key:'); if (k) { localStorage.setItem('commandKey', k); location.reload(); } }
  else loadPatterns();
</script>
</body>
</html>
