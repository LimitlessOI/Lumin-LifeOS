<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Pricing Validation -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Validation</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input[type="text"], textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; background-color: #007BFF; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pricing Validation</h1>
        <form id="pricingForm">
            <div class="form-group">
                <label for="product">Product Name:</label>
                <input type="text" id="product" name="product" required>
            </div>
            <div class="form-group">
                <label for="price">Proposed Price:</label>
                <input type="text" id="price" name="price" required pattern="\d+(\.\d{2})?" title="Please enter a valid price format, e.g., 99.99">
            </div>
            <div class="form-group">
                <label for="feedback">Feedback:</label>
                <textarea id="feedback" name="feedback" rows="4" required></textarea>
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>
    <script>
        document.getElementById('pricingForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const product = document.getElementById('product').value;
            const price = document.getElementById('price').value;
            const feedback = document.getElementById('feedback').value;
            console.log('Product:', product, 'Price:', price, 'Feedback:', feedback);
            alert('Thank you for your feedback!');
            this.reset();
        });
    </script>
</body>
</html>
