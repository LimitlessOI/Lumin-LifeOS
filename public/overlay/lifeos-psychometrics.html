<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Psychometric battery — LifeOS -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Psychometrics — LifeOS</title>
  <script src="/overlay/lifeos-theme.js"></script>
  <script src="/overlay/lifeos-bootstrap.js"></script>
  <style>
    body { margin:0; font-family:'Avenir Next','Segoe UI',sans-serif; background:#10141c; color:#e8eef8; }
    .root { max-width:720px; margin:0 auto; padding:28px 18px 80px; }
    h1 { margin:0 0 6px; } .sub { color:#8ea0b5; margin-bottom:18px; }
    .card { border:1px solid #2a3444; border-radius:12px; padding:14px; margin-bottom:12px; background:#151b26; }
    label { display:block; font-size:.8rem; color:#8ea0b5; margin:8px 0 4px; }
    input, select { width:100%; box-sizing:border-box; padding:10px; border-radius:8px; border:1px solid #2a3444; background:#0d121a; color:#e8eef8; }
    button { margin-top:10px; background:#3d6ea8; color:#fff; border:0; border-radius:8px; padding:10px 14px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="root">
    <h1>Psychometric battery</h1>
    <p class="sub">Big Five, VIA strengths, values, interests, skills — priors for purpose discovery.</p>
    <div class="card">
      <label for="instrument">Instrument</label>
      <select id="instrument"></select>
      <label for="label">Result label</label>
      <input id="label" placeholder="e.g. Openness-high / Curiosity">
      <label for="notes">Notes / answers summary</label>
      <input id="notes" placeholder="Short note">
      <button id="save" type="button">Save response</button>
      <div id="status" class="sub" style="margin-top:8px">Ready.</div>
    </div>
    <div class="card"><strong>Your profile</strong><div id="profile" class="sub">Loading…</div></div>
  </div>
  <script>
    async function loadInstruments() {
      const r = await fetch('/api/v1/lifeos/psychometrics/instruments');
      const j = await r.json();
      const sel = document.getElementById('instrument');
      (j.instruments || []).forEach((x) => {
        const o = document.createElement('option'); o.value = x; o.textContent = x; sel.appendChild(o);
      });
    }
    async function loadProfile() {
      const el = document.getElementById('profile');
      try {
        const r = await fetch('/api/v1/lifeos/psychometrics/me', { credentials: 'include' });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
        const p = j.profile || {};
        const keys = Object.keys(p);
        el.innerHTML = keys.length
          ? keys.map((k) => '<div>' + k + ': ' + (p[k].resultLabel || '') + '</div>').join('')
          : 'No responses yet.';
      } catch (e) { el.textContent = 'Sign in to load profile (' + e.message + ')'; }
    }
    document.getElementById('save').onclick = async () => {
      const status = document.getElementById('status');
      status.textContent = 'Saving…';
      try {
        const r = await fetch('/api/v1/lifeos/psychometrics/me', {
          method: 'POST', credentials: 'include',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            instrument: document.getElementById('instrument').value,
            result_label: document.getElementById('label').value,
            answers: { notes: document.getElementById('notes').value },
          }),
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        status.textContent = 'Saved.';
        loadProfile();
      } catch (e) { status.textContent = 'Save failed: ' + e.message; }
    };
    loadInstruments(); loadProfile();
  </script>
</body>
</html>
