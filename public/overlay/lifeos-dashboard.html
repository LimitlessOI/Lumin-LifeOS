<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LifeOS Dashboard</title>
<style>
:root{--bg:#0a0a0f;--card:#17171f;--border:rgba(255,255,255,0.07);--accent:#6c63ff;--text:#e8e8f0;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:20px;line-height:1.5}
.container{max-width:1200px;margin:0 auto}
h1{font-size:28px;margin-bottom:8px}
.time{opacity:0.6;font-size:14px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card h2{font-size:18px;margin-bottom:12px;color:var(--accent)}
.mit-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mit-item input[type=checkbox]{width:18px;height:18px;cursor:pointer}
.mit-item label{flex:1;cursor:pointer}
.mit-add{display:flex;gap:8px;margin-top:12px}
.mit-add input{flex:1;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px}
.mit-add button,.chat-input button{padding:8px 16px;background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:14px}
.event-item,.goal-item{margin-bottom:8px;font-size:14px}
.event-time{opacity:0.6;margin-right:8px}
.progress-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:var(--accent);transition:width 0.3s}
.scores{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.score-tile{text-align:center;padding:16px;background:var(--bg);border-radius:8px}
.score-value{font-size:32px;font-weight:bold;color:var(--accent)}
.score-label{font-size:12px;opacity:0.7;margin-top:4px}
.chat-messages{max-height:200px;overflow-y:auto;margin-bottom:12px;font-size:14px}
.chat-msg{margin-bottom:8px;padding:8px;background:var(--bg);border-radius:8px}
.chat-msg.user{text-align:right;background:var(--accent);color:#fff}
.chat-input{display:flex;gap:8px}
.chat-input input{flex:1;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px}
.error{color:#ff6b6b;font-size:12px;margin-top:8px}
</style>
</head>
<body>
<div class="container">
<header>
<h1 id="greeting">Good morning</h1>
<div class="time" id="time"></div>
</header>
<div class="grid">
<div class="card">
<h2>Today's MITs</h2>
<div id="mits"></div>
<div class="mit-add">
<input type="text" id="mitInput" placeholder="Add MIT...">
<button onclick="addMIT()">Add</button>
</div>
</div>
<div class="card">
<h2>Calendar</h2>
<div id="calendar"></div>
</div>
</div>
<div class="grid">
<div class="card">
<h2>Goals</h2>
<div id="goals"></div>
</div>
<div class="card">
<h2>Scores</h2>
<div class="scores" id="scores"></div>
</div>
</div>
<div class="card">
<h2>Chat with Lumin</h2>
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input">
<input type="text" id="chatInput" placeholder="Ask Lumin...">
<button onclick="sendChat()">Send</button>
</div>
</div>
</div>
<script type="module">
import{errHdl}from'/overlay/lifeos-bootstrap.js';
const apiKey=localStorage.getItem('lifeos_api_key');
const headers={'x-lifeos-key':apiKey,'Content-Type':'application/json'};
let threadId=null;

function updateTime(){
const now=new Date();
const hours=now.getHours();
document.getElementById('greeting').textContent=hours<12?'Good morning':hours<18?'Good afternoon':'Good evening';
document.getElementById('time').textContent=now.toLocaleString('en-US',{weekday:'long',month:'long',day:'numeric',hour:'numeric',minute:'2-digit'});
}
updateTime();
setInterval(updateTime,60000);

async function loadMITs(){
try{
const res=await fetch('/api/v1/lifeos/commitments?limit=20',{headers});
const data=await res.json();
const mits=data.commitments?.filter(c=>c.is_mit).slice(0,3)||[];
const html=mits.map(m=>`<div class="mit-item"><input type="checkbox" id="mit${m.id}" ${m.kept_at?'checked':''}><label for="mit${m.id}" onclick="toggleMIT(${m.id})">${m.text}</label></div>`).join('');
document.getElementById('mits').innerHTML=html||'<div style="opacity:0.5">No MITs yet</div>';
}catch(e){errHdl(e,'loadMITs');}
}

window.toggleMIT=async(id)=>{
try{
await fetch(`/api/v1/lifeos/commitments/${id}/keep`,{method:'POST',headers});
loadMITs();
}catch(e){errHdl(e,'toggleMIT');}
};

window.addMIT=async()=>{
const input=document.getElementById('mitInput');
const text=input.value.trim();
if(!text)return;
try{
await fetch('/api/v1/lifeos/commitments',{method:'POST',headers,body:JSON.stringify({text,is_mit:true})});
input.value='';
loadMITs();
}catch(e){errHdl(e,'addMIT');}
};

async function loadCalendar(){
try{
const res=await fetch('/api/v1/lifeos/engine/calendar/events?days=1&limit=5',{headers});
const data=await res.json();
const events=data.events||[];
const html=events.map(e=>`<div class="event-item"><span class="event-time">${new Date(e.start_time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</span>${e.title}</div>`).join('');
document.getElementById('calendar').innerHTML=html||'<div style="opacity:0.5">No events today</div>';
}catch(e){errHdl(e,'loadCalendar');}
}

async function loadGoals(){
try{
const res=await fetch('/api/v1/lifeos/finance/goals',{headers});
const data=await res.json();
const goals=data.goals||[];
const html=goals.slice(0,3).map(g=>{
const pct=g.target_amount>0?Math.min(100,(g.current_amount/g.target_amount)*100):0;
return`<div class="goal-item">${g.name}<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>`;
}).join('');
document.getElementById('goals').innerHTML=html||'<div style="opacity:0.5">No goals set</div>';
}catch(e){errHdl(e,'loadGoals');}
}

async function loadScores(){
try{
const res=await fetch('/api/v1/lifeos/dashboard/scoreboard',{headers});
const data=await res.json();
const scores=[
{label:'Integrity',value:data.integrity_score||0},
{label:'Health',value:data.health_score||0},
{label:'Focus',value:data.focus_score||0},
{label:'Growth',value:data.growth_score||0}
];
const html=scores.map(s=>`<div class="score-tile"><div class="score-value">${s.value}</div><div class="score-label">${s.label}</div></div>`).join('');
document.getElementById('scores').innerHTML=html;
}catch(e){errHdl(e,'loadScores');}
}

async function loadChat(){
try{
const tRes=await fetch('/api/v1/lifeos/chat/threads/default',{method:'POST',headers});
const tData=await tRes.json();
threadId=tData.thread.id;
const mRes=await fetch(`/api/v1/lifeos/chat/threads/${threadId}/messages?limit=5`,{headers});
const mData=await mRes.json();
const msgs=mData.messages||[];
const html=msgs.reverse().map(m=>`<div class="chat-msg ${m.role}">${m.content}</div>`).join('');
document.getElementById('chatMessages').innerHTML=html;
}catch(e){errHdl(e,'loadChat');}
}

window.sendChat=async()=>{
const input=document.getElementById('chatInput');
const text=input.value.trim();
if(!text||!threadId)return;
try{
const userMsg=`<div class="chat-msg user">${text}</div>`;
document.getElementById('chatMessages').innerHTML+=userMsg;
input.value='';
const res=await fetch(`/api/v1/lifeos/chat/threads/${threadId}/messages`,{method:'POST',headers,body:JSON.stringify({message:text})});
const data=await res.json();
const assistantMsg=`<div class="chat-msg assistant">${data.reply}</div>`;
document.getElementById('chatMessages').innerHTML+=assistantMsg;
document.getElementById('chatMessages').scrollTop=999999;
}catch(e){errHdl(e,'sendChat');}
};

document.getElementById('chatInput').addEventListener('keypress',e=>{if(e.key==='Enter')sendChat();});

async function loadDashboard(){
await Promise.all([loadMITs(),loadCalendar(),loadGoals(),loadScores(),loadChat()]);
}

loadDashboard();
</script>
</body>
</html>
