<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Wellness Studio -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Studio</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #FF5722;
            --background-color: #f0f0f0;
            --text-color: #333;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
        }
        .header {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            text-align: center;
            font-size: 24px;
        }
        .container {
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        select, button {
            padding: 10px;
            width: 100%;
            max-width: 300px;
            margin-bottom: 10px;
        }
        .insight-panel {
            background-color: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">Wellness Studio</div>
    <div class="container">
        <div class="form-group">
            <label for="session-type">Select Session Type</label>
            <select id="session-type">
                <option value="meditation">Meditation</option>
                <option value="yoga">Yoga</option>
                <option value="breathing">Breathing Exercise</option>
            </select>
        </div>
        <button id="start-session">Start Session</button>
        <div id="insight-panel" class="insight-panel" style="display: none;">
            <h3>Session Insights</h3>
            <p id="insight-content"></p>
            <p id="confidence-score"></p>
        </div>
    </div>
    <script>
        document.getElementById('start-session').addEventListener('click', function() {
            const sessionType = document.getElementById('session-type').value;
            fetch('/api/wellness-studio/sessions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ sessionType })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('insight-content').textContent = data.insightContent;
                document.getElementById('confidence-score').textContent = 'Confidence: ' + data.confidenceScore + '%';
                document.getElementById('insight-panel').style.display = 'block';
            })
            .catch(error => console.error('Error:', error));
        });
    </script>
</body>
</html>
