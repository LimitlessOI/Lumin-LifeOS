<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Failure Museum -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Failure Museum</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .failure-list {
            margin: 20px 0;
        }
        .failure-item {
            border: 1px solid #444;
            padding: 10px;
            margin-bottom: 10px;
        }
        form {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input, textarea, button {
            padding: 10px;
            border: 1px solid #444;
            background-color: #222;
            color: #fff;
        }
        button {
            cursor: pointer;
        }
    </style>
    <script src="/path/to/lifeos-bootstrap.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetch('/api/v1/lifeos/growth/failures')
                .then(response => response.json())
                .then(data => {
                    const listContainer = document.getElementById('failure-list');
                    if (data.length === 0) {
                        listContainer.innerHTML = '<p>No failures recorded yet. Add some below!</p>';
                    } else {
                        data.forEach(failure => {
                            const item = document.createElement('div');
                            item.className = 'failure-item';
                            item.innerHTML = `<h3>${failure.title}</h3>
                                              <p>Date: ${failure.date}</p>
                                              <p>Lesson Learned: ${failure.lessonLearned}</p>
                                              <p>What Changed: ${failure.whatChanged}</p>`;
                            listContainer.appendChild(item);
                        });
                    }
                })
                .catch(error => {
                    console.error('Error fetching failures:', error);
                });

            const form = document.getElementById('add-failure-form');
            form.addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(form);
                fetch('/api/v1/lifeos/growth/failures', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('Failure added successfully');
                        location.reload();
                    } else {
                        alert('Error adding failure');
                    }
                })
                .catch(error => {
                    console.error('Error adding failure:', error);
                });
            });
        });
    </script>
</head>
<body>
    <h1>Failure Museum</h1>
    <div id="failure-list" class="failure-list"></div>
    <form id="add-failure-form">
        <input type="text" name="title" placeholder="Title" required>
        <input type="date" name="date" required>
        <textarea name="lessonLearned" placeholder="Lesson Learned" required></textarea>
        <textarea name="whatChanged" placeholder="What Changed" required></textarea>
        <button type="submit">Add Failure</button>
    </form>
</body>
</html>
