<!DOCTYPE html>
<!-- SYNOPSIS: BirthBill pilot welcome after Stripe checkout -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BirthBill — Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Manrope:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Manrope, system-ui, sans-serif;
      background: linear-gradient(180deg, #e7f1f2, #f3f7f8);
      color: #142029;
      padding: 1.5rem;
    }
    .box {
      width: min(520px, 100%);
      background: #fff;
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 28px 70px rgba(10, 40, 48, 0.14);
    }
    h1 { font-family: Fraunces, Georgia, serif; color: #0a4548; margin: 0 0 0.75rem; }
    p { color: #4d5f6b; line-height: 1.55; }
    a { color: #0f6a6a; font-weight: 600; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Welcome to BirthBill</h1>
    <p id="msg">Confirming your pilot payment…</p>
    <p><a href="/birthbill">Back to BirthBill</a> · <a href="/clientcare-billing">Open operator board</a></p>
  </div>
  <script>
    const q = new URLSearchParams(location.search);
    const msg = document.getElementById('msg');
    if (q.get('paid') === '1') {
      msg.textContent = 'Pilot paid. Next: we connect your ClientCare login securely and seed your forever-chase unpaid-birth queue. Reply to your receipt email or open the operator board when invited.';
    } else {
      msg.textContent = 'We could not confirm payment yet. If you were charged, email support with your practice name — we will match the Stripe receipt.';
    }
  </script>
</body>
</html>
