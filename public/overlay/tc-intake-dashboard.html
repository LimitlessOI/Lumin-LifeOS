<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Intake Dashboard -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .card { border: 1px solid #ccc; border-radius: 5px; padding: 15px; margin: 10px; }
        .status { display: inline-block; padding: 5px 10px; border-radius: 3px; color: #fff; }
        .completed { background-color: green; }
        .failed { background-color: red; }
        .pending { background-color: yellow; color: #000; }
        button { padding: 10px 15px; border: none; border-radius: 5px; background-color: blue; color: white; cursor: pointer; }
        button:disabled { background-color: grey; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="dashboard"></div>
    <script>
        function fetchRuns() {
            fetch('/api/tc/intake/runs')
                .then(response => response.json())
                .then(data => renderRuns(data))
                .catch(error => console.error('Error fetching runs:', error));
        }

        function renderRuns(runs) {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';
            runs.forEach(run => {
                const card = document.createElement('div');
                card.className = 'card';
                const statusClass = run.status === 'completed' ? 'completed' : run.status === 'failed' ? 'failed' : 'pending';
                card.innerHTML = `
                    <div>Transaction ID: ${run.transactionId}</div>
                    <div>Status: <span class="status ${statusClass}">${run.status}</span></div>
                    <div>QA Results: ${run.qaResults}</div>
                    <div>skySlope File ID: ${run.skySlopeFileId}</div>
                    <button onclick="approveRun('${run.transactionId}', '${run.emailMessageId}')" ${run.status !== 'pending' ? 'disabled' : ''}>Approve & Continue</button>
                `;
                dashboard.appendChild(card);
            });
        }

        function approveRun(transactionId, emailMessageId) {
            fetch('/api/tc/intake/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ transactionId, emailMessageId })
            })
            .then(response => {
                if (response.ok) {
                    fetchRuns(); // Refresh the dashboard
                } else {
                    console.error('Error approving run.');
                }
            })
            .catch(error => console.error('Error:', error));
        }

        document.addEventListener('DOMContentLoaded', fetchRuns);
    </script>
</body>
</html>
