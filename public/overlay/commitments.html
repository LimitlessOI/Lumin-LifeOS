<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Commitments Overlay -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commitments Overlay</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgba(0, 0, 0, 0.5);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #commitments-overlay {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin: 8px 0;
            padding: 10px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="commitments-overlay">
        <h2>Commitment List</h2>
        <ul>
            <li data-id="1">Commitment 1 Description</li>
            <li data-id="2">Commitment 2 Description</li>
            <li data-id="3">Commitment 3 Description</li>
        </ul>
    </div>
</body>
</html>
