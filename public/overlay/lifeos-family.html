<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/overlay/lifeos-theme.js"></script>
  <script src="/overlay/lifeos-bootstrap.js"></script>
  <link rel="stylesheet" href="/overlay/lifeos-ds.css">
  <title>Family OS — LifeOS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      min-height: 100vh;
    }

    .page-root {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }
    .page-header h1 { font-size: 24px; font-weight: 700; color: #e8e8f0; }
    .page-header .subtitle { font-size: 13px; color: #666; margin-top: 4px; }
    .user-switcher { display: flex; gap: 8px; align-items: center; }
    .user-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #333;
      background: transparent;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .user-btn.active { background: #1a1a2e; border-color: #5b6af5; color: #a0aaff; }
    .user-btn:hover:not(.active) { border-color: #555; color: #ccc; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid #1e1e2e;
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 10px 18px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: -1px;
    }
    .tab-btn.active { color: #a0aaff; border-bottom-color: #5b6af5; }
    .tab-btn:hover:not(.active) { color: #ccc; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Cards ── */
    .card {
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 16px;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #333;
      border-top-color: #5b6af5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #555; font-size: 14px; }
    .section-error { color: #ff6b6b; font-size: 13px; padding: 10px 0; }
    .empty-state { color: #555; font-size: 13px; text-align: center; padding: 20px 0; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #5b6af5;
      background: #1a1a2e;
      color: #a0aaff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: #23233a; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-ghost {
      background: transparent;
      border-color: #333;
      color: #888;
    }
    .btn-ghost:hover { border-color: #555; color: #ccc; background: transparent; }

    /* ── Score displays ── */
    .pulse-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }
    .pulse-item {
      background: #16161f;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }
    .pulse-label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }
    .pulse-score {
      font-size: 36px;
      font-weight: 700;
    }
    .score-high   { color: #4ade80; }
    .score-mid    { color: #facc15; }
    .score-low    { color: #f87171; }
    .score-none   { color: #444; font-size: 20px; }

    /* ── Gratitude block ── */
    .gratitude-block {
      background: #16161f;
      border-left: 3px solid #5b6af5;
      border-radius: 0 8px 8px 0;
      padding: 14px 16px;
      font-size: 14px;
      color: #c8c8d8;
      line-height: 1.6;
      font-style: italic;
      margin-bottom: 16px;
    }

    /* ── Inline form ── */
    .inline-form {
      background: #16161f;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 20px;
      margin-top: 12px;
    }
    .form-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 14px;
    }
    .form-row label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input, .form-textarea {
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 6px;
      color: #e8e8f0;
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      width: 100%;
    }
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: #5b6af5;
    }
    .form-textarea { min-height: 80px; resize: vertical; line-height: 1.5; }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .slider-row input[type=range] {
      flex: 1;
      accent-color: #5b6af5;
    }
    .slider-val {
      font-size: 18px;
      font-weight: 700;
      color: #a0aaff;
      min-width: 24px;
      text-align: right;
    }

    /* ── Debrief cards ── */
    .debrief-card {
      background: #16161f;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 12px;
    }
    .debrief-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .debrief-date { font-size: 12px; color: #555; }
    .debrief-context {
      font-size: 13px;
      color: #c8c8d8;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .repair-badge {
      font-size: 12px;
      color: #5b6af5;
      background: #1a1a2e;
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 8px;
    }
    .ack-badge {
      font-size: 11px;
      color: #4ade80;
      background: #0d2019;
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* ── Result card (after debrief submit) ── */
    .result-card {
      background: #111118;
      border: 1px solid #5b6af5;
      border-radius: 12px;
      padding: 20px 24px;
      margin-top: 20px;
    }
    .result-section {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e1e2e;
    }
    .result-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .result-label {
      font-size: 11px;
      color: #5b6af5;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .result-text { font-size: 14px; color: #c8c8d8; line-height: 1.65; }

    /* ── Commitment rows ── */
    .commitment-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #131320;
    }
    .commitment-row:last-child { border-bottom: none; }
    .commitment-title { font-size: 14px; color: #c8c8d8; flex: 1; }
    .commitment-meta { font-size: 12px; color: #555; margin-top: 2px; }
    .commitment-owner {
      font-size: 11px;
      color: #a0aaff;
      background: #1a1a2e;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }
  </style>
  <link rel="stylesheet" href="/overlay/lifeos-theme-overrides.css">
</head>
<body>
<div class="page-root">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h1>Family OS</h1>
      <div class="subtitle">Relationship health, debriefs, and shared commitments</div>
    </div>
    <div class="user-switcher">
      <span style="font-size:12px;color:#555;">User:</span>
      <button class="user-btn active" onclick="switchUser('adam')">Adam</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('relationship')">Relationship</button>
    <button class="tab-btn"        onclick="showTab('debriefs')">Debriefs</button>
    <button class="tab-btn"        onclick="showTab('shared')">Shared Commitments</button>
  </div>

  <!-- ── Tab: Relationship ───────────────────────────────────────────────── -->
  <div id="tab-relationship" class="tab-panel active">

    <!-- Connection Pulse -->
    <div class="card">
      <div class="card-title">Connection Pulse</div>
      <div id="pulse-area">
        <div class="loading-text"><span class="spinner"></span>Loading pulse…</div>
      </div>
    </div>

    <!-- Log Check-In -->
    <div class="card">
      <div class="card-title">Log Check-In</div>
      <div id="checkin-partner-row" style="margin-bottom:14px;">
        <div class="form-row">
          <label>Partner handle</label>
          <input id="checkin-partner" class="form-input" placeholder="e.g. sarah" style="max-width:200px;">
        </div>
      </div>
      <div class="inline-form" id="checkin-form">
        <div class="form-row">
          <label>Connection (1–10)</label>
          <div class="slider-row">
            <input type="range" id="connection-slider" min="1" max="10" value="7"
              oninput="document.getElementById('connection-val').textContent=this.value">
            <div class="slider-val" id="connection-val">7</div>
          </div>
        </div>
        <div class="form-row">
          <label>Conflict level (1–10)</label>
          <div class="slider-row">
            <input type="range" id="conflict-slider" min="1" max="10" value="3"
              oninput="document.getElementById('conflict-val').textContent=this.value">
            <div class="slider-val" id="conflict-val">3</div>
          </div>
        </div>
        <div class="form-row">
          <label>What is working?</label>
          <textarea id="checkin-working" class="form-textarea" placeholder="What's going well…"></textarea>
        </div>
        <div class="form-row">
          <label>What needs attention?</label>
          <textarea id="checkin-attention" class="form-textarea" placeholder="What could be better…"></textarea>
        </div>
        <div class="form-row">
          <label>Gratitude note</label>
          <textarea id="checkin-gratitude" class="form-textarea" placeholder="Something you appreciate about your partner…"></textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:4px;">
          <button class="btn" id="checkin-submit-btn" onclick="submitCheckin()">Save check-in</button>
        </div>
        <div id="checkin-feedback" style="margin-top:10px;font-size:13px;"></div>
      </div>
    </div>

  </div>

  <!-- ── Tab: Debriefs ───────────────────────────────────────────────────── -->
  <div id="tab-debriefs" class="tab-panel">

    <!-- New Debrief Form -->
    <div class="card">
      <div class="card-title">New Debrief</div>
      <div class="inline-form">
        <div class="form-row">
          <label>What happened? (context)</label>
          <textarea id="debrief-context" class="form-textarea" style="min-height:100px;"
            placeholder="Describe the situation — what led up to it, who was involved…"></textarea>
        </div>
        <div class="form-row">
          <label>What was said? (optional)</label>
          <textarea id="debrief-said" class="form-textarea"
            placeholder="Key things that were said, if you want to include them…"></textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:4px;">
          <button class="btn" id="debrief-submit-btn" onclick="submitDebrief()">Get debrief</button>
        </div>
        <div id="debrief-spinner" style="display:none;margin-top:12px;">
          <span class="spinner"></span><span class="loading-text">Analyzing…</span>
        </div>
      </div>
    </div>

    <!-- Result card shown after submission -->
    <div id="debrief-result" style="display:none;"></div>

    <!-- Recent Debriefs -->
    <div class="card">
      <div class="card-title">Recent Debriefs</div>
      <div id="debriefs-list">
        <div class="loading-text"><span class="spinner"></span>Loading debriefs…</div>
      </div>
    </div>

  </div>

  <!-- ── Tab: Shared Commitments ────────────────────────────────────────── -->
  <div id="tab-shared" class="tab-panel">
    <div class="card">
      <div class="card-title">Shared With Me</div>
      <div id="shared-list">
        <div class="loading-text"><span class="spinner"></span>Loading…</div>
      </div>
    </div>
  </div>

</div><!-- /page-root -->

<script>
  // ── Config ─────────────────────────────────────────────────────────────
  const CTX = window.LifeOSBootstrap.getLifeOSContext({ promptForKey: true });
  const API = '/api/v1/lifeos/family';
  let KEY  = CTX.KEY;
  let USER = CTX.USER;

  function headers() { return CTX.headers(); }

  // ── Tab switching ──────────────────────────────────────────────────────
  function showTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'relationship') loadPulse();
    if (name === 'debriefs')     loadDebriefs();
    if (name === 'shared')       loadShared();
  }

  function switchUser(u) {
    USER = u;
    document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    loadPulse();
    loadDebriefs();
    loadShared();
  }

  // ── Score colour ───────────────────────────────────────────────────────
  function scoreClass(v, invert = false) {
    if (v === null || v === undefined) return 'score-none';
    const n = +v;
    if (invert) { // high conflict = bad
      if (n <= 3) return 'score-high';
      if (n <= 6) return 'score-mid';
      return 'score-low';
    }
    if (n >= 7) return 'score-high';
    if (n >= 4) return 'score-mid';
    return 'score-low';
  }

  // ── Load pulse ─────────────────────────────────────────────────────────
  async function loadPulse() {
    const el = document.getElementById('pulse-area');
    // We need a partner — try to load linked users first
    try {
      const r = await fetch(`${API}/linked?user=${USER}`, { headers: headers() });
      const d = await r.json();
      if (!d.ok || !d.linked || d.linked.length === 0) {
        el.innerHTML = '<div class="empty-state">No linked partners yet. Use the check-in form to log a check-in with a partner handle.</div>';
        return;
      }
      const partner = d.linked[0];
      const pr = await fetch(`${API}/relationship/pulse?user_a=${USER}&user_b=${partner.linked_user_id}&days=30`, { headers: headers() });
      const pd = await pr.json();
      if (!pd.ok) { el.innerHTML = `<div class="section-error">${pd.error}</div>`; return; }
      const { averages, checkins } = pd;
      const latest = checkins && checkins[0];
      el.innerHTML = `
        <div style="margin-bottom:12px;font-size:13px;color:#555;">Partner: <span style="color:#a0aaff;">${partner.display_name || partner.user_handle}</span></div>
        <div class="pulse-grid">
          <div class="pulse-item">
            <div class="pulse-label">Connection (avg)</div>
            <div class="pulse-score ${scoreClass(averages.avg_connection)}">${averages.avg_connection ?? '—'}</div>
          </div>
          <div class="pulse-item">
            <div class="pulse-label">Conflict (avg)</div>
            <div class="pulse-score ${scoreClass(averages.avg_conflict, true)}">${averages.avg_conflict ?? '—'}</div>
          </div>
        </div>
        ${latest && latest.gratitude_note
          ? `<div class="gratitude-label" style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;">Latest gratitude</div>
             <div class="gratitude-block">"${escHtml(latest.gratitude_note)}"</div>`
          : ''}
        <div style="font-size:12px;color:#555;">${averages.total_checkins} check-in${averages.total_checkins === 1 ? '' : 's'} in last 30 days</div>
      `;
    } catch (err) {
      el.innerHTML = `<div class="section-error">${err.message}</div>`;
    }
  }

  // ── Submit check-in ────────────────────────────────────────────────────
  async function submitCheckin() {
    const partner = document.getElementById('checkin-partner').value.trim();
    if (!partner) { alert('Enter a partner handle'); return; }
    const btn = document.getElementById('checkin-submit-btn');
    const fb  = document.getElementById('checkin-feedback');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    fb.textContent  = '';
    try {
      const r = await fetch(`${API}/relationship/checkin`, {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({
          user:                USER,
          partner_user:        partner,
          connection_score:    +document.getElementById('connection-slider').value,
          conflict_level:      +document.getElementById('conflict-slider').value,
          what_is_working:     document.getElementById('checkin-working').value.trim()    || undefined,
          what_needs_attention:document.getElementById('checkin-attention').value.trim()  || undefined,
          gratitude_note:      document.getElementById('checkin-gratitude').value.trim()  || undefined,
        }),
      });
      const d = await r.json();
      if (d.ok) {
        fb.style.color = '#4ade80';
        fb.textContent = 'Check-in saved.';
        loadPulse();
      } else {
        fb.style.color = '#f87171';
        fb.textContent = d.error || 'Error saving check-in';
      }
    } catch (err) {
      fb.style.color = '#f87171';
      fb.textContent = err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save check-in';
    }
  }

  // ── Load debriefs ──────────────────────────────────────────────────────
  async function loadDebriefs() {
    const el = document.getElementById('debriefs-list');
    try {
      const r = await fetch(`${API}/debrief?user=${USER}&days=30`, { headers: headers() });
      const d = await r.json();
      if (!d.ok) { el.innerHTML = `<div class="section-error">${d.error}</div>`; return; }
      if (!d.debriefs.length) { el.innerHTML = '<div class="empty-state">No debriefs yet.</div>'; return; }
      el.innerHTML = d.debriefs.map(db => `
        <div class="debrief-card">
          <div class="debrief-meta">
            <div class="debrief-date">${db.debrief_date}</div>
            ${db.user_acknowledged ? '<span class="ack-badge">Acknowledged</span>' : `<button class="btn btn-sm btn-ghost" onclick="ackDebrief(${db.id}, this)">Acknowledge</button>`}
          </div>
          <div class="debrief-context">${escHtml((db.conversation_context || '').slice(0, 120))}${(db.conversation_context || '').length > 120 ? '…' : ''}</div>
          ${db.repair_path ? `<div class="repair-badge">Repair path available</div>` : ''}
        </div>
      `).join('');
    } catch (err) {
      el.innerHTML = `<div class="section-error">${err.message}</div>`;
    }
  }

  // ── Submit debrief ─────────────────────────────────────────────────────
  async function submitDebrief() {
    const ctx  = document.getElementById('debrief-context').value.trim();
    const said = document.getElementById('debrief-said').value.trim();
    if (!ctx) { alert('Describe what happened first'); return; }
    const btn     = document.getElementById('debrief-submit-btn');
    const spinner = document.getElementById('debrief-spinner');
    const resultEl = document.getElementById('debrief-result');
    btn.disabled = true;
    spinner.style.display = 'block';
    resultEl.style.display = 'none';
    try {
      const r = await fetch(`${API}/debrief`, {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({ user: USER, conversation_context: ctx, what_was_said: said || undefined }),
      });
      const d = await r.json();
      if (!d.ok) { resultEl.innerHTML = `<div class="section-error">${d.error}</div>`; resultEl.style.display='block'; return; }
      const db = d.debrief;
      resultEl.style.display = 'block';
      resultEl.innerHTML = `
        <div class="result-card">
          <div class="result-section">
            <div class="result-label">What happened</div>
            <div class="result-text">${escHtml(db.ai_insight || '')}</div>
          </div>
          <div class="result-section">
            <div class="result-label">Underlying needs</div>
            <div class="result-text">${escHtml(db.underlying_need || '')}</div>
          </div>
          <div class="result-section">
            <div class="result-label">Emotional tone</div>
            <div class="result-text">${escHtml(db.emotional_tone || '')}</div>
          </div>
          <div class="result-section">
            <div class="result-label">Repair path</div>
            <div class="result-text">${escHtml(db.repair_path || '')}</div>
          </div>
        </div>
      `;
      document.getElementById('debrief-context').value = '';
      document.getElementById('debrief-said').value    = '';
      loadDebriefs();
    } catch (err) {
      resultEl.innerHTML = `<div class="section-error">${err.message}</div>`;
      resultEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
    }
  }

  // ── Acknowledge debrief ────────────────────────────────────────────────
  async function ackDebrief(id, btn) {
    btn.disabled = true;
    try {
      const r = await fetch(`${API}/debrief/${id}/acknowledge`, { method: 'POST', headers: headers() });
      const d = await r.json();
      if (d.ok) loadDebriefs();
    } catch (_) {}
  }

  // ── Load shared commitments ────────────────────────────────────────────
  async function loadShared() {
    const el = document.getElementById('shared-list');
    try {
      const r = await fetch(`${API}/shared-commitments?user=${USER}`, { headers: headers() });
      const d = await r.json();
      if (!d.ok) { el.innerHTML = `<div class="section-error">${d.error}</div>`; return; }
      if (!d.commitments.length) { el.innerHTML = '<div class="empty-state">No commitments shared with you yet.</div>'; return; }
      el.innerHTML = d.commitments.map(c => `
        <div class="commitment-row">
          <div style="flex:1;">
            <div class="commitment-title">${escHtml(c.title || '')}</div>
            <div class="commitment-meta">${c.status || ''} ${c.due_at ? '· due ' + c.due_at.slice(0,10) : ''}</div>
          </div>
          <div class="commitment-owner">${escHtml(c.owner_name || '')}</div>
        </div>
      `).join('');
    } catch (err) {
      el.innerHTML = `<div class="section-error">${err.message}</div>`;
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ───────────────────────────────────────────────────────────────
  loadPulse();
  loadDebriefs();
</script>
</body>
</html>
