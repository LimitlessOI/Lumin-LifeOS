<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Conversation Commitments v1 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Commitments v1</title>
    <script type="module" src="/lifeos-bootstrap.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        h1, h2 { color: #333; }
        textarea { width: 100%; min-height: 150px; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        .commitment-item { background-color: #f9f9f9; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .commitment-item p { margin: 0 0 5px 0; }
        .commitment-item .source-quote { font-size: 0.9em; color: #666; font-style: italic; }
        .commitment-list { margin-top: 20px; }
        .commitment-list h3 { margin-top: 0; }
        .status-buttons button { margin-right: 5px; padding: 5px 10px; font-size: 0.9em; }
        .status-buttons .done { background-color: #28a745; }
        .status-buttons .defer { background-color: #ffc107; color: #333; }
        .status-buttons .broken { background-color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Conversation Commitments v1</h1>

        <section>
            <h2>Extract Commitments</h2>
            <textarea id="conversationText" placeholder="Paste conversation text here..."></textarea>
            <button id="extractButton">Extract</button>
        </section>

        <section id="previewSection" style="display: none;">
            <h2>Extracted Commitments Preview</h2>
            <div id="extractedCommitmentsList">
                <!-- Extracted commitments will be rendered here -->
            </div>
            <button id="saveSelectedButton" style="display: none;">Save Selected</button>
        </section>

        <section>
            <h2>Open Commitments</h2>
            <div id="openCommitmentsList">
                <!-- Open commitments will be rendered here -->
            </div>
        </section>
    </div>

    <script type="module">
        import { api } from '/lifeos-bootstrap.js';

        const conversationTextarea = document.getElementById('conversationText');
        const extractButton = document.getElementById('extractButton');
        const previewSection = document.getElementById('previewSection');
        const extractedCommitmentsList = document.getElementById('extractedCommitmentsList');
        const saveSelectedButton = document.getElementById('saveSelectedButton');
        const openCommitmentsList = document.getElementById('openCommitmentsList');

        let extractedCommitments = []; // Store commitments from extraction for saving

        async function fetchOpenCommitments() {
            try {
                const response = await api.get('/api/commitments/open');
                renderOpenCommitments(response.data);
            } catch (error) {
                console.error('Failed to fetch open commitments:', error);
                openCommitmentsList.innerHTML = '<p>Failed to load open commitments.</p>';
            }
        }

        function renderOpenCommitments(commitments) {
            openCommitmentsList.innerHTML = '';
            if (commitments.length === 0) {
                openCommitmentsList.innerHTML = '<p>No open commitments.</p>';
                return;
            }
            commitments.forEach(commitment => {
                const div = document.createElement('div');
                div.className = 'commitment-item';
                div.innerHTML = `
                    <p><strong>Commitment:</strong> ${commitment.text}</p>
                    <p class="source-quote">Source: "${commitment.sourceQuote}"</p>
                    <div class="status-buttons">
                        <button class="done" data-id="${commitment.id}" data-status="done">Done</button>
                        <button class="defer" data-id="${commitment.id}" data-status="deferred">Defer</button>
                        <button class="broken
