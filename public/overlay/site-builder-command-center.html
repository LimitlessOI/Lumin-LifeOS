<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Site Builder Command Center -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Builder Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen" x-data="dashboard()" x-init="init()">
  <!-- AUTH MODAL -->
  <div x-show="!commandKey" x-cloak class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-gray-800 rounded-xl p-8 w-full max-w-md shadow-2xl border border-gray-700">
      <h2 class="text-xl font-bold mb-1 text-white">Site Builder Command Center</h2>
      <p class="text-sm text-gray-400 mb-6">Enter your command key to continue</p>
      <input x-model="keyInput" type="password" placeholder="Command key..."
        class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 mb-4"
        @keydown.enter="connect()">
      <button @click="connect()"
        class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition">
        Connect
      </button>
      <p x-show="authError" class="mt-3 text-red-400 text-sm text-center" x-text="authError"></p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div x-show="commandKey" x-cloak>
    <!-- HEADER -->
    <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between sticky top-0 z-40">
      <div class="flex items-center gap-3">
        <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
        <h1 class="text-lg font-bold tracking-tight">Site Builder Command Center</h1>
      </div>
      <div class="flex items-center gap-4">
        <button @click="loadData()" :disabled="loading" class="text-sm text-gray-400 hover:text-white transition disabled:opacity-50">
          ↻ Refresh
        </button>
        <button @click="logout()" class="text-sm text-gray-500 hover:text-red-400 transition">
          Logout
        </button>
      </div>
    </header>

    <!-- LAUNCH BANNER -->
    <div x-show="envStatus" id="launch-banner" class="px-6 py-3 text-sm font-medium"
         :class="envReady ? 'bg-green-900 text-green-200' : 'bg-red-900 text-red-200'">
      <template x-if="envReady">
        <span>✅ All required environment variables are set. Ready for launch!</span>
      </template>
      <template x-if="!envReady">
        <span>⚠️ Missing required environment variables: <span
