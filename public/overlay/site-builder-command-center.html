<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Builder Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen" x-data="dashboard()" x-init="init()">

  <!-- AUTH MODAL -->
  <div x-show="!commandKey" x-cloak
    class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-gray-800 rounded-xl p-8 w-full max-w-md shadow-2xl border border-gray-700">
      <h2 class="text-xl font-bold mb-1 text-white">Site Builder Command Center</h2>
      <p class="text-sm text-gray-400 mb-6">Enter your command key to continue</p>
      <input x-model="keyInput" type="password" placeholder="Command key..."
        class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 mb-4"
        @keydown.enter="connect()">
      <button @click="connect()"
        class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition">
        Connect
      </button>
      <p x-show="authError" class="mt-3 text-red-400 text-sm text-center" x-text="authError"></p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div x-show="commandKey" x-cloak>

    <!-- HEADER -->
    <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between sticky top-0 z-40">
      <div class="flex items-center gap-3">
        <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
        <h1 class="text-lg font-bold tracking-tight">Site Builder Command Center</h1>
      </div>
      <div class="flex items-center gap-4">
        <button @click="loadData()" :disabled="loading"
          class="text-sm text-gray-400 hover:text-white transition disabled:opacity-50">
          ↻ Refresh
        </button>
        <button @click="logout()"
          class="text-sm text-gray-500 hover:text-red-400 transition">
          Logout
        </button>
      </div>
    </header>

    <!-- PIPELINE STATS -->
    <div class="px-6 py-5 bg-gray-900/50 border-b border-gray-800">
      <div class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-8 gap-3">
        <template x-for="stat in statCards" :key="stat.label">
          <div class="bg-gray-800 rounded-lg p-3 border border-gray-700">
            <div class="text-xs text-gray-500 uppercase tracking-wide mb-1" x-text="stat.label"></div>
            <div class="text-2xl font-bold" :class="stat.color" x-text="stat.value"></div>
          </div>
        </template>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="px-6 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- LEFT COLUMN: ANALYZE + BUILD -->
      <div class="lg:col-span-1 space-y-5">

        <!-- SCORE EXISTING SITE -->
        <div class="bg-gray-800 rounded-xl border border-gray-700 p-5">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">Score Existing Site</h2>
          <form @submit.prevent="analyzeProspect()">
            <input x-model="analyzeUrl" type="url" placeholder="https://theirbusiness.com"
              class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 mb-3"
              required>
            <button type="submit" :disabled="analyzing"
              class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white text-sm font-semibold py-2 rounded-lg transition">
              <span x-show="!analyzing">Analyze Site</span>
              <span x-show="analyzing">Analyzing...</span>
            </button>
          </form>

          <div x-show="scoreResult" class="mt-4">
            <div class="flex items-start justify-between mb-3">
              <div>
                <div class="text-xs text-gray-500 mb-1">Opportunity Score</div>
                <div class="text-4xl font-black" :class="scoreColor(scoreResult?.opportunityScore)"
                  x-text="(scoreResult?.opportunityScore ?? 0) + '/100'"></div>
              </div>
              <div class="text-5xl font-black" :class="scoreColor(scoreResult?.opportunityScore)"
                x-text="scoreResult?.grade"></div>
            </div>
            <p class="text-xs text-gray-400 mb-3" x-text="scoreResult?.recommendation"></p>
            <div x-show="scoreResult?.painPoints?.length" class="mb-3">
              <div class="text-xs font-semibold text-red-400 mb-1">Pain Points Detected</div>
              <ul class="space-y-1">
                <template x-for="p in (scoreResult?.painPoints || [])" :key="p">
                  <li class="text-xs text-gray-300 flex gap-2">
                    <span class="text-red-400 shrink-0">⚠</span>
                    <span x-text="p"></span>
                  </li>
                </template>
              </ul>
            </div>
            <div x-show="scoreResult?.strengths?.length">
              <div class="text-xs font-semibold text-green-400 mb-1">Strengths</div>
              <ul class="space-y-1">
                <template x-for="s in (scoreResult?.strengths || [])" :key="s">
                  <li class="text-xs text-gray-300 flex gap-2">
                    <span class="text-green-400 shrink-0">✓</span>
                    <span x-text="s"></span>
                  </li>
                </template>
              </ul>
            </div>
            <button @click="prefillBuild()"
              class="mt-3 w-full text-xs text-purple-400 hover:text-purple-300 border border-purple-800 hover:border-purple-600 rounded-lg py-1.5 transition">
              → Use URL in Build Form
            </button>
          </div>
          <p x-show="analyzeError" class="mt-3 text-red-400 text-xs" x-text="analyzeError"></p>
        </div>

        <!-- BUILD & SEND -->
        <div class="bg-gray-800 rounded-xl border border-gray-700 p-5">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">Build & Send Outreach</h2>
          <form @submit.prevent="buildProspect()">
            <div class="space-y-2 mb-3">
              <input x-model="buildForm.businessUrl" type="url" placeholder="Business URL *"
                class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500"
                required>
              <input x-model="buildForm.contactEmail" type="email" placeholder="Contact email (optional)"
                class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500">
              <input x-model="buildForm.contactName" type="text" placeholder="Contact first name"
                class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500">
              <input x-model="buildForm.businessName" type="text" placeholder="Business name"
                class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500">
              <label class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer select-none">
                <input type="checkbox" x-model="buildForm.skipEmail" class="accent-purple-500">
                Skip email send
              </label>
            </div>
            <button type="submit" :disabled="building"
              class="w-full bg-purple-600 hover:bg-purple-700 disabled:opacity-50 text-white text-sm font-semibold py-2.5 rounded-lg transition">
              <span x-show="!building">Build Mock Site & Send</span>
              <span x-show="building">Building… (30–60s)</span>
            </button>
          </form>

          <div x-show="buildResult" class="mt-4 p-3 bg-gray-900 rounded-lg border border-gray-700">
            <div class="flex items-center gap-2 mb-2 flex-wrap">
              <span class="text-green-400">✓</span>
              <span class="text-sm font-semibold text-green-400">Site Built</span>
              <span x-show="buildResult?.qaHold"
                class="text-xs bg-yellow-900 text-yellow-300 px-2 py-0.5 rounded-full">QA Hold</span>
              <span x-show="buildResult?.emailSent"
                class="text-xs bg-green-900 text-green-300 px-2 py-0.5 rounded-full">Email Sent</span>
            </div>
            <a :href="buildResult?.previewUrl" target="_blank"
              class="text-xs text-purple-400 hover:text-purple-300 underline break-all"
              x-text="buildResult?.previewUrl"></a>
            <div class="mt-2 text-xs text-gray-500" x-text="buildResult?.businessName"></div>
            <div x-show="buildResult?.qualityReport" class="mt-1 text-xs text-gray-400">
              Quality: <span x-text="buildResult?.qualityReport?.grade"></span>
              <span x-show="buildResult?.qualityReport?.score">
                (<span x-text="buildResult?.qualityReport?.score"></span>)
              </span>
            </div>
          </div>
          <p x-show="buildError" class="mt-3 text-red-400 text-xs" x-text="buildError"></p>
        </div>
      </div>

      <!-- RIGHT COLUMN: PROSPECT TABLE -->
      <div class="lg:col-span-2">
        <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
          <div class="px-5 py-4 border-b border-gray-700 flex items-center justify-between">
            <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Prospects</h2>
            <span class="text-xs text-gray-600" x-text="prospects.length + ' records'"></span>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-gray-900 text-xs text-gray-500 uppercase tracking-wide">
                <tr>
                  <th class="px-4 py-3 text-left">Business</th>
                  <th class="px-4 py-3 text-left">Status</th>
                  <th class="px-4 py-3 text-left">Contact</th>
                  <th class="px-4 py-3 text-left">Preview</th>
                  <th class="px-4 py-3 text-left">Created</th>
                  <th class="px-4 py-3 text-left">Update</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-700/40">
                <template x-if="prospects.length === 0">
                  <tr>
                    <td colspan="6" class="px-4 py-10 text-center text-gray-600 text-xs">
                      No prospects yet — score and build your first one
                    </td>
                  </tr>
                </template>
                <template x-for="p in prospects" :key="p.client_id">
                  <tr class="hover:bg-gray-700/30 transition">
                    <td class="px-4 py-3">
                      <div class="font-medium text-white text-xs" x-text="p.business_name || '—'"></div>
                      <div class="text-xs text-gray-500 truncate max-w-[180px]" x-text="p.business_url || ''"></div>
                    </td>
                    <td class="px-4 py-3">
                      <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                        :class="statusBadge(p.status)" x-text="p.status || 'built'"></span>
                    </td>
                    <td class="px-4 py-3 text-xs text-gray-400" x-text="p.contact_email || '—'"></td>
                    <td class="px-4 py-3">
                      <a x-show="p.preview_url" :href="p.preview_url" target="_blank"
                        class="text-xs text-purple-400 hover:text-purple-300 underline">View →</a>
                      <span x-show="!p.preview_url" class="text-gray-600 text-xs">—</span>
                    </td>
                    <td class="px-4 py-3 text-xs text-gray-500" x-text="formatDate(p.created_at)"></td>
                    <td class="px-4 py-3">
                      <select @change="updateStatus(p.client_id, $event.target.value)"
                        class="text-xs bg-gray-900 border border-gray-700 rounded px-2 py-1 text-gray-300 focus:outline-none focus:border-purple-500 cursor-pointer">
                        <option value="" disabled selected>Change…</option>
                        <option value="built">built</option>
                        <option value="sent">sent</option>
                        <option value="viewed">viewed</option>
                        <option value="replied">replied</option>
                        <option value="converted">converted</option>
                        <option value="lost">lost</option>
                      </select>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div x-show="toast.visible" x-transition.opacity
    class="fixed bottom-6 right-6 px-4 py-3 rounded-lg text-sm font-medium shadow-xl z-50 pointer-events-none"
    :class="toast.type === 'error' ? 'bg-red-900 text-red-200 border border-red-700' : 'bg-gray-700 text-gray-100 border border-gray-600'"
    x-text="toast.message">
  </div>

  <script>
    function dashboard() {
      return {
        commandKey: localStorage.getItem('sb_command_key') || '',
        keyInput: '',
        authError: '',

        loading: false,
        analyzing: false,
        building: false,

        statCards: [],
        prospects: [],

        analyzeUrl: '',
        scoreResult: null,
        analyzeError: '',

        buildForm: { businessUrl: '', contactEmail: '', contactName: '', businessName: '', skipEmail: false },
        buildResult: null,
        buildError: '',

        toast: { visible: false, message: '', type: 'info' },

        init() {
          if (this.commandKey) this.loadData();
        },

        connect() {
          if (!this.keyInput.trim()) { this.authError = 'Key required'; return; }
          this.commandKey = this.keyInput.trim();
          localStorage.setItem('sb_command_key', this.commandKey);
          this.authError = '';
          this.loadData();
        },

        logout() {
          localStorage.removeItem('sb_command_key');
          this.commandKey = '';
          this.keyInput = '';
        },

        async loadData() {
          this.loading = true;
          try {
            const [dash, prosp] = await Promise.all([
              this.apiFetch('/api/v1/sites/dashboard'),
              this.apiFetch('/api/v1/sites/prospects?limit=50'),
            ]);
            if (dash && dash.ok !== false) {
              const d = dash.pipeline || dash;
              this.statCards = [
                { label: 'Total',     value: d.total     ?? 0,  color: 'text-white' },
                { label: 'Built',     value: d.built     ?? 0,  color: 'text-blue-400' },
                { label: 'QA Hold',   value: d.qa_hold   ?? d.qaHold ?? 0, color: 'text-yellow-400' },
                { label: 'Sent',      value: d.sent      ?? 0,  color: 'text-indigo-400' },
                { label: 'Viewed',    value: d.viewed    ?? 0,  color: 'text-purple-400' },
                { label: 'Replied',   value: d.replied   ?? 0,  color: 'text-pink-400' },
                { label: 'Converted', value: d.converted ?? 0,  color: 'text-green-400' },
                { label: 'Revenue',   value: '$' + (d.total_revenue ?? d.totalRevenue ?? 0).toLocaleString(), color: 'text-emerald-400' },
              ];
            }
            const rows = Array.isArray(prosp) ? prosp : (Array.isArray(prosp?.prospects) ? prosp.prospects : []);
            this.prospects = rows;
          } catch (e) {
            this.showToast('Load failed: ' + e.message, 'error');
          } finally {
            this.loading = false;
          }
        },

        async analyzeProspect() {
          this.analyzing = true;
          this.scoreResult = null;
          this.analyzeError = '';
          try {
            const data = await this.apiFetch('/api/v1/sites/analyze', 'POST', { businessUrl: this.analyzeUrl });
            if (data.ok === false) throw new Error(data.error || 'Analyze failed');
            this.scoreResult = data;
          } catch (e) {
            this.analyzeError = e.message;
          } finally {
            this.analyzing = false;
          }
        },

        async buildProspect() {
          this.building = true;
          this.buildResult = null;
          this.buildError = '';
          try {
            const data = await this.apiFetch('/api/v1/sites/prospect', 'POST', this.buildForm);
            if (data.success === false) throw new Error(data.error || 'Build failed');
            this.buildResult = data;
            this.showToast(data.emailSent ? 'Built — email sent!' : 'Site built (email not sent)');
            await this.loadData();
          } catch (e) {
            this.buildError = e.message;
            this.showToast('Build failed: ' + e.message, 'error');
          } finally {
            this.building = false;
          }
        },

        async updateStatus(clientId, status) {
          if (!status) return;
          try {
            await this.apiFetch('/api/v1/sites/prospects/' + clientId + '/status', 'PATCH', { status });
            const p = this.prospects.find(x => x.client_id === clientId);
            if (p) p.status = status;
            this.showToast('Status updated');
          } catch (e) {
            this.showToast('Update failed: ' + e.message, 'error');
          }
        },

        prefillBuild() {
          if (this.scoreResult?.url) this.buildForm.businessUrl = this.scoreResult.url;
        },

        async apiFetch(path, method = 'GET', body = null) {
          const opts = {
            method,
            headers: { 'Content-Type': 'application/json', 'x-command-key': this.commandKey },
          };
          if (body) opts.body = JSON.stringify(body);
          const res = await fetch(path, opts);
          if (res.status === 401 || res.status === 403) {
            this.logout();
            this.authError = 'Invalid key — please reconnect';
            throw new Error('Unauthorized');
          }
          return res.json();
        },

        scoreColor(score) {
          if (!score) return 'text-gray-400';
          if (score >= 80) return 'text-red-400';
          if (score >= 60) return 'text-orange-400';
          if (score >= 40) return 'text-yellow-400';
          return 'text-green-400';
        },

        statusBadge(status) {
          const map = {
            built:     'bg-gray-700 text-gray-300',
            qa_hold:   'bg-yellow-900/60 text-yellow-300',
            sent:      'bg-blue-900/60 text-blue-300',
            viewed:    'bg-indigo-900/60 text-indigo-300',
            replied:   'bg-purple-900/60 text-purple-300',
            converted: 'bg-green-900/60 text-green-300',
            lost:      'bg-red-900/60 text-red-400',
            expired:   'bg-gray-800 text-gray-500',
          };
          return map[status] || map.built;
        },

        formatDate(iso) {
          if (!iso) return '—';
          return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        },

        showToast(message, type = 'success') {
          this.toast = { visible: true, message, type };
          setTimeout(() => { this.toast.visible = false; }, 3500);
        },
      };
    }
  </script>
</body>
</html>
