<!DOCTYPE html>
<!-- SYNOPSIS: HTML page: Template Selection -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Selection</title>
    <style>
        .template-option {
            display: inline-block;
            width: 150px;
            margin: 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 5px;
            transition: transform 0.2s;
        }
        .template-option:hover {
            transform: scale(1.05);
            border-color: #007BFF;
        }
        .template-thumbnail {
            width: 100%;
            height: 100px;
            background-color: #f0f0f0;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div id="template-selection">
        <div class="template-option">
            <div class="template-thumbnail"></div>
            <span>Template 1</span>
        </div>
        <div class="template-option">
            <div class="template-thumbnail"></div>
            <span>Template 2</span>
        </div>
        <div class="template-option">
            <div class="template-thumbnail"></div>
            <span>Template 3</span>
        </div>
        <div class="template-option">
            <div class="template-thumbnail"></div>
            <span>Template 4</span>
        </div>
        <div class="template-option">
            <div class="template-thumbnail"></div>
            <span>Template 5</span>
        </div>
        <div class="template-option">
            <div class="template-thumbnail"></div>
            <span>Template 6</span>
        </div>
    </div>
</body>
</html>
